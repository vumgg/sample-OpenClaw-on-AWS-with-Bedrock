<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Enterprise — UI Guide</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--card:#222536;--border:#2d3148;--primary:#6366f1;--pl:#818cf8;--success:#10b981;--warn:#f59e0b;--danger:#ef4444;--cyan:#06b6d4;--text:#e2e8f0;--ts:#94a3b8;--tm:#64748b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.ctr{max-width:1100px;margin:0 auto;padding:20px}
.hdr{text-align:center;padding:40px 20px 24px;border-bottom:1px solid var(--border)}
.hdr h1{font-size:26px;margin-bottom:6px}
.hdr p{color:var(--ts);font-size:14px}
.lt{display:flex;gap:4px;justify-content:center;margin-top:14px}
.lb{padding:5px 16px;border-radius:20px;border:1px solid var(--border);background:0;color:var(--tm);cursor:pointer;font-size:13px;transition:.2s}
.lb.a{background:var(--primary);color:#fff;border-color:var(--primary)}
.rt{display:flex;gap:4px;justify-content:center;margin:20px 0;background:var(--surface);border-radius:10px;padding:4px;width:fit-content;margin-inline:auto}
.rtb{padding:8px 24px;border-radius:8px;border:0;background:0;color:var(--tm);cursor:pointer;font-size:14px;font-weight:500;transition:.2s}
.rtb.a{background:var(--primary);color:#fff}
.pb{display:flex;gap:2px;margin:16px 0 24px;overflow-x:auto;padding:4px 0}
.ps{flex:1;min-width:60px;text-align:center;padding:6px 2px;border-radius:8px;cursor:pointer;transition:.2s;border:1px solid transparent;font-size:10px}
.ps:hover{background:var(--surface)}.ps.a{background:var(--primary);border-color:var(--primary);color:#fff}
.ps.d{border-color:var(--success)}.ps .sn{display:block;font-size:10px;color:var(--tm)}.ps.a .sn,.ps.a .sl{color:#fff}
.ps.d .sn{color:var(--success)}.sl{font-weight:500}
.sc{display:none}.sc.a{display:block}
.sk{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px}
.st{font-size:20px;font-weight:600;margin-bottom:4px}
.sd{color:var(--ts);font-size:14px;margin-bottom:16px}
/* Why box */
.wb{border:1px solid rgba(245,158,11,.15);background:rgba(245,158,11,.04);border-radius:10px;margin:12px 0;overflow:hidden}
.wh{display:flex;align-items:center;gap:8px;padding:12px 16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--warn);user-select:none}
.wh::after{content:'▾';margin-left:auto;transition:.2s;font-size:11px}
.wb.c .wh::after{transform:rotate(-90deg)}
.wc{padding:0 16px 14px;font-size:13px;color:var(--ts);line-height:1.7}
.wb.c .wc{display:none}
/* Mockup */
.mk{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:14px 0}
.mh{background:var(--surface);padding:8px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px}
.mb{padding:14px}
.ms{display:flex}.msb{width:170px;background:var(--bg);padding:10px;border-right:1px solid var(--border);min-height:280px}
.msi{padding:6px 10px;border-radius:6px;font-size:11px;color:var(--tm);margin-bottom:2px;cursor:default}
.msi.a{background:var(--primary);color:#fff}.msi.sub{padding-left:22px;font-size:10px}
.mm{flex:1;padding:14px;min-height:280px}
.mi{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 11px;color:var(--text);font-size:12px;width:100%;display:block;margin-bottom:6px}
.btn{display:inline-block;padding:5px 14px;border-radius:8px;font-size:11px;font-weight:500;cursor:default}
.btn.p{background:var(--primary);color:#fff}.btn.s{background:var(--success);color:#fff}
.btn.g{background:0;border:1px solid var(--border);color:var(--ts)}
.bg{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.bg.gn{background:rgba(16,185,129,.12);color:var(--success)}.bg.yl{background:rgba(245,158,11,.12);color:var(--warn)}
.bg.bl{background:rgba(99,102,241,.12);color:var(--pl)}.bg.cy{background:rgba(6,182,212,.12);color:var(--cyan)}
.mt{width:100%;border-collapse:collapse;font-size:11px}
.mt th{text-align:left;padding:5px 8px;color:var(--tm);font-size:10px;text-transform:uppercase;border-bottom:1px solid var(--border);font-weight:500}
.mt td{padding:7px 8px;border-bottom:1px solid rgba(45,49,72,.4)}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.ss{text-align:center;padding:10px;background:var(--bg);border-radius:8px;border:1px solid var(--border)}
.ss .v{font-size:20px;font-weight:700}.ss .l{font-size:9px;color:var(--tm);margin-top:2px}
/* Annotation */
.an{display:flex;align-items:flex-start;gap:10px;border-radius:8px;padding:11px 14px;margin:10px 0;font-size:12px}
.an.i{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.15)}
.an.s{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.15)}
.an.w{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15)}
.an.c{background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.15)}
.ai{font-size:15px;flex-shrink:0;margin-top:1px}.at{flex:1}.at strong{color:var(--text)}
/* Chain */
.ch{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin:8px 0}
.cn{padding:3px 9px;border-radius:6px;font-size:10px;font-weight:600;border:1px solid var(--border);background:var(--bg)}
.cn.p{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.3);color:var(--pl)}
.cn.s{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:var(--success)}
.cn.c{background:rgba(6,182,212,.1);border-color:rgba(6,182,212,.3);color:var(--cyan)}
.ca{color:var(--tm);font-size:11px}
.cb{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;font-family:'SF Mono',Monaco,monospace;font-size:11px;color:var(--ts);white-space:pre-wrap;margin:6px 0;overflow-x:auto}
.hs{position:relative;display:inline-block}.hs::after{content:"";position:absolute;inset:-3px;border:2px solid var(--warn);border-radius:8px;animation:pu 1.5s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.mtb{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:10px}
.mti{padding:5px 12px;font-size:11px;color:var(--tm);border-bottom:2px solid transparent;cursor:default}
.mti.a{color:var(--pl);border-bottom-color:var(--primary)}
.nb{display:flex;justify-content:space-between;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}
.nvb{padding:9px 22px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;transition:.2s}
.nvb:hover{border-color:var(--primary);color:var(--pl)}.nvb.p{background:var(--primary);border-color:var(--primary);color:#fff}
.nvb:disabled{opacity:.35;cursor:not-allowed}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.sep{border-top:1px solid var(--border);margin:12px 0}
</style>
</head>
<body>
<div class="hdr">
  <h1 id="ht"></h1><p id="hp"></p>
  <div class="lt"><button class="lb a" onclick="L('en')">English</button><button class="lb" onclick="L('zh')">中文</button></div>
</div>
<div class="ctr">
  <div class="rt"><button class="rtb a" onclick="R('admin')" id="ra"></button><button class="rtb" onclick="R('emp')" id="re"></button></div>
  <div class="pb" id="pb"></div>
  <div id="sc"></div>
  <div class="nb">
    <button class="nvb" id="bp" onclick="P()">←</button>
    <button class="nvb p" id="bn" onclick="N()">→</button>
  </div>
</div>
<script>
let lang='en',role='admin',step=0;
const T={en:{t:'OpenClaw Enterprise — UI Guide',d:'Step-by-step walkthrough for IT Administrators and Employees',admin:'IT Admin (15 steps)',emp:'Employee (6 steps)',prev:'← Previous',next:'Next →'},
zh:{t:'OpenClaw Enterprise — 使用指南',d:'IT 管理员和员工的分步操作指南',admin:'IT 管理员 (15步)',emp:'员工 (6步)',prev:'← 上一步',next:'下一步 →'}};

function wb(eW,cW,eC,cC){return `<div class="wb" onclick="this.classList.toggle('c')"><div class="wh">💡 ${lang==='en'?'Why This Matters / 设计逻辑':'设计逻辑 / Why This Matters'}</div><div class="wc">${lang==='en'?eC:cC}</div></div>`;}
function an(icon,cls,e,c){return `<div class="an ${cls}"><span class="ai">${icon}</span><div class="at">${lang==='en'?e:c}</div></div>`;}
function mk(hdr,body){return `<div class="mk"><div class="mh">${hdr}</div><div class="mb">${body}</div></div>`;}

const S={admin:[
{id:'login',en:'Access the Admin Console',zh:'登录管理控制台',de:'Connect via SSM port forwarding and sign in.',dz:'通过 SSM 端口转发连接并登录。',
h(){return wb('','',
'The Admin Console runs behind SSM Session Manager — there is no public URL exposed to the internet. This is a deliberate security design: think of SSM as a VPN tunnel that <strong>only authorized AWS IAM users</strong> can open. Even if someone discovers the EC2 IP, they cannot access the console without IAM credentials.',
'管理控制台运行在 SSM Session Manager 之后，没有公网地址。这是刻意的安全设计：可以把 SSM 理解为<strong>只有授权 IAM 用户才能打开</strong>的 VPN 隧道。即使有人发现了 EC2 IP，没有 IAM 凭证也无法访问控制台。'
)+an('💻','c',
'<strong>Run on your local machine:</strong><div class="cb">aws ssm start-session --target &lt;INSTANCE_ID&gt; --region &lt;REGION&gt; \\\n  --document-name AWS-StartPortForwardingSession \\\n  --parameters \'{"portNumber":["8099"],"localPortNumber":["8099"]}\'</div>Then open <strong>http://localhost:8099</strong>',
'<strong>在本地机器运行：</strong><div class="cb">aws ssm start-session --target &lt;INSTANCE_ID&gt; --region &lt;REGION&gt; \\\n  --document-name AWS-StartPortForwardingSession \\\n  --parameters \'{"portNumber":["8099"],"localPortNumber":["8099"]}\'</div>然后打开 <strong>http://localhost:8099</strong>'
)+mk('OpenClaw Enterprise — Login',`<div style="text-align:center;padding:30px"><div style="max-width:300px;margin:0 auto"><div style="font-size:17px;font-weight:600;margin-bottom:16px">${lang==='en'?'Sign In':'登录'}</div><input class="mi" placeholder="Employee ID (emp-jiade)" readonly><input class="mi" type="password" placeholder="Password" readonly><div class="hs"><div class="btn p" style="width:100%;text-align:center;padding:9px">${lang==='en'?'Sign In':'登录'}</div></div><div style="margin-top:14px;font-size:10px;color:var(--tm)">${lang==='en'?'Demo accounts:':'演示账号：'}</div><div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;justify-content:center"><span class="bg bl">Jiade Wu (Admin)</span><span class="bg gn">Carol (Finance)</span><span class="bg cy">Ryan (SDE)</span><span class="bg yl">Sarah (SA)</span></div></div></div>`
)+an('✅','s','<strong>Default admin:</strong> emp-jiade / &lt;your ADMIN_PASSWORD from .env&gt;','<strong>默认管理员：</strong> emp-jiade / &lt;.env 里设置的 ADMIN_PASSWORD&gt;')}},

{id:'dashboard',en:'Platform Health Overview',zh:'平台健康总览',de:'Dashboard with setup checklist, stats, and quick actions.',dz:'仪表盘展示配置清单、统计数据和快捷操作。',
h(){return wb('','',
'The dashboard is your <strong>command center</strong>. The setup checklist appears automatically when steps are incomplete, giving first-time admins a clear roadmap instead of leaving them to guess. Each checklist item links directly to the page you need. The stat cards update in real-time, so you always know the platform pulse.',
'仪表盘是您的<strong>指挥中心</strong>。设置清单在步骤未完成时自动显示，为首次使用的管理员提供清晰路线图。每个清单项都直接链接到对应页面。统计卡片实时更新，让您随时掌握平台动态。'
)+mk('Dashboard',`<div class="ms"><div class="msb"><div class="msi a">Dashboard</div><div class="msi">Organization ▾</div><div class="msi sub">Departments</div><div class="msi sub">Positions</div><div class="msi sub">Employees</div><div class="msi">Agent Factory</div><div class="msi">Workspace</div><div class="msi">Skill Market</div><div class="msi">Knowledge Base</div><div class="msi">IM Channels</div><div class="msi">Security Center</div><div class="msi">Monitor</div><div class="msi">Playground</div><div class="msi">Settings</div></div><div class="mm"><div style="font-size:14px;font-weight:600;margin-bottom:10px">${lang==='en'?'Setup Checklist':'配置清单'}</div><div style="display:flex;flex-direction:column;gap:4px;margin-bottom:14px"><div style="display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;background:rgba(16,185,129,.06);font-size:11px"><span style="color:var(--success)">✓</span> ${lang==='en'?'Deploy infrastructure':'部署基础设施'}</div><div style="display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;background:rgba(16,185,129,.06);font-size:11px"><span style="color:var(--success)">✓</span> ${lang==='en'?'Seed org data':'导入组织数据'}</div><div style="display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;background:rgba(245,158,11,.06);font-size:11px"><span style="color:var(--warn)">○</span> ${lang==='en'?'Configure SOUL templates':'配置 SOUL 模板'}</div><div style="display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;background:rgba(245,158,11,.06);font-size:11px"><span style="color:var(--warn)">○</span> ${lang==='en'?'Connect IM channels':'连接 IM 通道'}</div><div style="display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;background:rgba(245,158,11,.06);font-size:11px"><span style="color:var(--warn)">○</span> ${lang==='en'?'Test in Playground':'在 Playground 测试'}</div></div><div class="sg"><div class="ss"><div class="v">5</div><div class="l">Departments</div></div><div class="ss"><div class="v">10</div><div class="l">Positions</div></div><div class="ss"><div class="v">27</div><div class="l">Employees</div></div><div class="ss"><div class="v">20</div><div class="l">Agents</div></div></div></div></div>`)}},

{id:'dept',en:'Department Structure',zh:'部门管理',de:'Create department hierarchy mirroring your org chart.',dz:'创建反映公司组织结构的部门层级。',
h(){return wb('','',
'Departments are the <strong>top-level isolation boundary</strong>. Like physical office floors in a building, they separate teams so a Sales agent cannot accidentally access Engineering knowledge bases, and managers only see agents within their scope. Without departments, all agents would be in one flat pool with no governance.',
'部门是<strong>顶层隔离边界</strong>。就像大楼的不同楼层，部门将团队分开，销售 Agent 无法意外访问工程知识库，经理只能看到其管辖范围内的 Agent。没有部门，所有 Agent 将在一个无治理边界的平面池中。'
)+an('📍','i',`<strong>${lang==='en'?'Navigate to:':'导航到：'}</strong> Organization → Departments`,'<strong>导航到：</strong> Organization → Departments'
)+mk(lang==='en'?'Department Overview':'部门概览',`<div class="grid3" style="grid-template-columns:repeat(5,1fr);gap:6px">${[['Engineering',12,'var(--primary)'],['Sales',8,'#8b5cf6'],['Finance',4,'var(--cyan)'],['Product',5,'var(--success)'],['Legal',3,'var(--warn)']].map(([n,c,cl])=>`<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center"><div style="width:28px;height:28px;border-radius:50%;background:${cl};margin:0 auto 6px;opacity:.7"></div><div style="font-size:12px;font-weight:600">${n}</div><div style="font-size:10px;color:var(--tm)">${c} people</div><div style="margin-top:6px;background:var(--border);border-radius:4px;height:4px"><div style="background:var(--success);border-radius:4px;height:4px;width:${Math.min(100,c*10)}%"></div></div></div>`).join('')}</div>`)}},

{id:'pos',en:'Positions — Agent DNA',zh:'岗位管理 — Agent 的 DNA',de:'The core building block: positions define agent SOUL, skills, and permissions.',dz:'核心构建块：岗位定义 Agent 的 SOUL、技能和权限。',
h(){return wb('','',
'Think of a Position as a <strong>job description for an AI agent</strong>. Just like a real company gives each role a written spec, a position defines the SOUL template (personality + rules), default skills, knowledge bases, and tool permissions. Assign an employee to a position, their agent inherits everything. <strong>Change the position once, and every agent in that role updates.</strong> This is the difference between managing 5 agents and managing 500.',
'把岗位想象成 <strong>AI Agent 的岗位说明书</strong>。就像真实公司为每个角色编写规范，岗位定义了 SOUL 模板（个性 + 规则）、默认技能、知识库和工具权限。将员工分配到岗位后，Agent 自动继承所有配置。<strong>修改一次岗位，该角色下每个 Agent 都更新。</strong>这就是管理 5 个和 500 个 Agent 的区别。'
)+an('📍','i',`<strong>${lang==='en'?'Navigate to:':'导航到：'}</strong> Organization → Positions`,'<strong>导航到：</strong> Organization → Positions'
)+mk(lang==='en'?'Position Management':'岗位管理',`<div class="sg"><div class="ss"><div class="v">10</div><div class="l">Positions</div></div><div class="ss"><div class="v">27</div><div class="l">Members</div></div><div class="ss"><div class="v">20</div><div class="l">Agents</div></div><div class="ss"><div class="v" style="color:var(--warn)">3/10</div><div class="l">SOUL Done</div></div></div><table class="mt"><tr><th>Position</th><th>Dept</th><th>SOUL</th><th>Skills</th><th>Provision</th></tr><tr><td style="color:var(--pl)">Solutions Architect</td><td>Tech</td><td><span class="bg gn">286 words</span></td><td>3</td><td><span class="bg gn">5/5</span></td></tr><tr><td style="color:var(--pl)">Software Engineer</td><td>Tech</td><td><span class="bg gn">312 words</span></td><td>4</td><td><span class="bg gn">4/4</span></td></tr><tr><td style="color:var(--pl)">Finance Analyst</td><td>Finance</td><td><span class="bg yl">Empty</span></td><td>2</td><td><span class="bg yl">2/3</span></td></tr><tr><td style="color:var(--pl)">Account Executive</td><td>Sales</td><td><span class="bg yl">Empty</span></td><td>2</td><td><span class="bg gn">3/3</span></td></tr></table>`
)+an('⚠️','w',lang==='en'?'Positions with <strong>Empty</strong> SOUL badge need attention — agents won\'t know their professional identity.':'标记为 <strong>Empty</strong> 的岗位需要配置 — 没有 SOUL 的 Agent 不知道自己的职业身份。','')}},

{id:'emp',en:'Employee Management',zh:'员工管理',de:'Assign employees to positions — agents are auto-provisioned.',dz:'将员工分配到岗位 — Agent 自动配置。',
h(){return wb('','',
'Employees bridge your <strong>human org chart</strong> and the <strong>AI workforce</strong>. Each employee maps 1:1 to an agent. Auto-provisioning means you never manually configure an individual agent — assign the employee to the right position, and the platform does the rest. Like onboarding a new hire: give them a role, they automatically get laptop, access badge, and training materials.',
'员工是<strong>人类组织架构</strong>与 <strong>AI 数字员工</strong>之间的桥梁。每个员工与一个 Agent 一一对应。自动配置意味着您无需手动配置单个 Agent — 将员工分配到正确岗位，平台自动完成。就像新员工入职：给一个角色，自动获得笔记本、门禁和培训。'
)+an('📍','i',`<strong>${lang==='en'?'Navigate to:':'导航到：'}</strong> Organization → Employees`,'<strong>导航到：</strong> Organization → Employees'
)+mk(lang==='en'?'Employee Management':'员工管理',`<table class="mt"><tr><th>Employee</th><th>Position</th><th>Channels</th><th>Agent</th><th>Status</th></tr><tr><td><span style="display:inline-block;width:24px;height:24px;border-radius:50%;background:#6366f1;text-align:center;line-height:24px;font-size:10px;color:#fff;margin-right:6px">CZ</span>Carol Zhang</td><td><span class="bg bl">Finance Analyst</span></td><td><span style="color:var(--success);font-size:10px">● Slack</span></td><td style="color:var(--pl)">carol-fa</td><td><span class="bg gn">Online</span></td></tr><tr><td><span style="display:inline-block;width:24px;height:24px;border-radius:50%;background:#8b5cf6;text-align:center;line-height:24px;font-size:10px;color:#fff;margin-right:6px">RP</span>Ryan Park</td><td><span class="bg bl">Software Engineer</span></td><td><span style="color:var(--warn);font-size:10px">● Discord</span></td><td style="color:var(--pl)">ryan-sde</td><td><span class="bg yl">Idle</span></td></tr><tr><td><span style="display:inline-block;width:24px;height:24px;border-radius:50%;background:var(--cyan);text-align:center;line-height:24px;font-size:10px;color:#fff;margin-right:6px">MJ</span>Mike Johnson</td><td><span class="bg bl">Account Executive</span></td><td><span style="color:var(--tm);font-size:10px">● —</span></td><td style="color:var(--warn)">Unbound</td><td><span class="bg yl">—</span></td></tr></table>`)}},

{id:'soul-g',en:'Global SOUL — Company Constitution',zh:'全局 SOUL — 公司章程',de:'Define company-wide rules every agent must follow.',dz:'定义所有 Agent 都必须遵循的公司级规则。',
h(){return wb('','',
'The Global SOUL is like a <strong>company constitution</strong>. It establishes core identity ("You are a digital employee of ACME Corp"), compliance rules ("Never share customer PII"), and behavioral guardrails that <strong>no position or personal customization can override</strong>. If your company has 50 different agent roles, the global SOUL ensures they all share the same ethical and legal foundation.',

{id:'soul-p',en:'Position SOUL — Department Handbook',zh:'岗位 SOUL — 部门手册',de:'Write role-specific behavior that makes each agent a specialist.',dz:'编写角色专属行为，使每个 Agent 成为专家。',

)+an('⚠️','w',lang==='en'?'<strong>Position-level edit</strong> affects all 5 agents sharing this position. For individual changes, use the Personal layer.':'<strong>岗位级编辑</strong>会影响共享此岗位的所有 5 个 Agent。个人更改请使用个人层。','')}},

{id:'soul-u',en:'Personal SOUL — Your Desk Setup',zh:'个人 SOUL — 你的办公桌',de:'Individual customization without affecting other agents.',dz:'个性化定制，不影响其他 Agent。',

)+an('📍','i',`<strong>${lang==='en'?'Navigate to:':'导航到：'}</strong> Agent Factory → ${lang==='en'?'click agent':'点击 Agent'} → Edit SOUL`,'<strong>导航到：</strong> Agent Factory → 点击 Agent → Edit SOUL'
)+mk('SOUL Editor — carol-fa (Carol Zhang)',`<div class="mtb"><div class="mti">🔒 Global</div><div class="mti">✏️ Position</div><div class="mti a">✏️ Personal</div></div><div style="background:rgba(16,185,129,.04);border:1px solid rgba(16,185,129,.15);border-radius:6px;padding:8px;margin-bottom:8px;font-size:11px;color:var(--success)">Personal: Carol Zhang — ${lang==='en'?'affects only this agent':'仅影响此 Agent'}</div><div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;font-family:monospace;font-size:11px;color:var(--ts);min-height:60px">${lang==='en'?'I prefer concise bullet points.\nAlways respond in Chinese when I write in Chinese.\nMy timezone is Asia/Shanghai.':'我喜欢简洁的要点格式。\n当我用中文提问时请用中文回复。\n我的时区是 Asia/Shanghai。'}</div><div style="display:flex;justify-content:flex-end;gap:6px;margin-top:8px"><div class="btn g">${lang==='en'?'Preview Merged':'预览合并'}</div><div class="btn p">${lang==='en'?'Save Personal':'保存个人层'}</div></div>`)}},

{id:'af',en:'Agent Factory — Fleet Management',zh:'Agent 工厂 — 车队管理',de:'Overview of all agents: status, quality, models, deployment mode.',dz:'所有 Agent 概览：状态、质量、模型、部署模式。',

{id:'skills',en:'Skill Market — Apps for Agents',zh:'技能市场 — Agent 的应用商店',de:'Browse skills, check prerequisites, assign to positions.',dz:'浏览技能、检查前置条件、分配给岗位。',
h(){return wb('','',
'Skills are like <strong>apps on a phone</strong>. The phone (agent) has basic conversation ability, but skills extend what it can do — web search, CRM queries, SAP integration. The key design: <strong>skills are assigned to positions, not individuals</strong>. Install once for the "SA" role, all 20 SA agents get it. Some skills need API keys (shown as prerequisites); others use IAM roles and need <strong>zero config</strong>.',
'技能就像<strong>手机上的应用</strong>。手机（Agent）自带对话能力，但技能扩展了它 — 网络搜索、CRM 查询、SAP 集成。关键设计：<strong>技能分配给岗位而非个人</strong>。为"SA"角色安装一次，20 个 SA Agent 都获得。有些需要 API 密钥（显示为前置条件），有些用 IAM 角色<strong>零配置</strong>。'
)+an('📍','i',`<strong>${lang==='en'?'Navigate to:':'导航到：'}</strong> Skill Market → ${lang==='en'?'click any skill':'点击任一技能'}`,'<strong>导航到：</strong> Skill Market → 点击任一技能'
)+mk('aws-bedrock-kb-search',`<div style="display:flex;gap:4px;margin-bottom:10px"><span class="bg bl">Layer 2</span><span class="bg gn">information</span></div><div style="font-size:11px;color:var(--ts);margin-bottom:12px">${lang==='en'?'Search enterprise knowledge bases via Amazon Bedrock (RAG). Semantic search with source attribution.':'通过 Amazon Bedrock 搜索企业知识库 (RAG)。支持语义搜索和来源标注。'}</div><div style="background:var(--bg);border-radius:8px;padding:10px;margin-bottom:8px"><div style="display:flex;align-items:center;gap:5px;margin-bottom:6px"><span style="background:var(--primary);color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center">1</span><span style="font-size:12px;font-weight:500">${lang==='en'?'Prerequisites':'前置条件'}</span><span class="bg gn">${lang==='en'?'Ready':'就绪'}</span></div><div style="font-size:10px;color:var(--tm);margin-left:21px">BEDROCK_KB_ID — <span class="bg gn">IAM Role</span></div></div><div style="background:var(--bg);border-radius:8px;padding:10px"><div style="display:flex;align-items:center;gap:5px;margin-bottom:6px"><span style="background:var(--primary);color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center">2</span><span style="font-size:12px;font-weight:500">${lang==='en'?'Assign to Position':'分配给岗位'}</span></div><div style="display:flex;gap:6px;align-items:center;margin-left:21px"><select class="mi" style="width:auto;flex:1;margin:0"><option>${lang==='en'?'Select position...':'选择岗位...'}</option></select><div class="hs"><div class="btn p">${lang==='en'?'Assign':'分配'}</div></div></div></div>`)}},

{id:'kb',en:'Knowledge Base — Company Library',zh:'知识库 — 公司图书馆',de:'Upload documents, assign to positions for RAG retrieval.',dz:'上传文档，分配给岗位用于 RAG 检索。',
h(){return wb('','',
'Knowledge bases give agents access to <strong>your company\'s proprietary information</strong> — product docs, HR policies, customer contracts. Without a KB, agents only use training data. The assignment model is like a <strong>library card system</strong>: the KB is the library, and you decide which roles get a library card. Global KBs are for everyone; department-scoped ones are restricted.',
'知识库让 Agent 访问<strong>公司专有信息</strong> — 产品文档、HR 政策、客户合同。没有知识库，Agent 只能用训练数据。分配模型像<strong>图书借阅证系统</strong>：KB 是图书馆，您决定哪些角色获得借阅证。全局 KB 对所有人可用，部门级 KB 有访问限制。'
)+an('📍','i',`<strong>${lang==='en'?'Navigate to:':'导航到：'}</strong> Knowledge Base`,'<strong>导航到：</strong> Knowledge Base'
)+mk(lang==='en'?'Knowledge Base':'知识库',`<table class="mt"><tr><th>${lang==='en'?'Name':'名称'}</th><th>${lang==='en'?'Scope':'范围'}</th><th>Docs</th><th>${lang==='en'?'Size':'大小'}</th></tr><tr><td>Product Documentation</td><td><span class="bg bl">global</span></td><td>42</td><td>8.2 MB</td></tr><tr><td>HR Policy Manual</td><td><span class="bg gn">department</span></td><td>18</td><td>3.1 MB</td></tr><tr><td>Contract Templates</td><td><span class="bg gn">department</span></td><td>24</td><td>14.1 MB</td></tr></table>`)}},

{id:'im',en:'IM Channels — Last Mile',zh:'IM 渠道 — 最后一公里',de:'Connect Telegram, Discord, Slack so employees chat via IM.',dz:'连接 Telegram、Discord、Slack，让员工通过 IM 对话。',
h(){return wb('','',
'IM channels are the <strong>last mile</strong> — they connect AI agents to the messaging platforms employees already use daily. Instead of forcing everyone to use a new web portal, <strong>agents meet employees where they are</strong>. Admin configures once in OpenClaw Gateway, then employees self-pair through the Portal. No new app to install.',
'IM 渠道是<strong>最后一公里</strong> — 将 AI Agent 连接到员工日常使用的消息平台。无需强制所有人使用新的网页门户，<strong>Agent 在员工已有的平台上交流</strong>。管理员在 Gateway 中配置一次，员工通过门户自助配对。无需安装新应用。'
)+`<div class="an c"><span class="ai">🌐</span><div class="at"><strong>${lang==='en'?'Option A: Gateway Web UI':'方式 A：Gateway Web UI'}</strong><div class="cb">aws ssm start-session --target &lt;INSTANCE_ID&gt; --region &lt;REGION&gt; \\\n  --document-name AWS-StartPortForwardingSession \\\n  --parameters '{"portNumber":["18789"],"localPortNumber":["18789"]}'</div>${lang==='en'?'Open':'打开'} <strong>http://localhost:18789/?token=&lt;TOKEN&gt;</strong> → Channels</div></div><div class="an c"><span class="ai">💻</span><div class="at"><strong>${lang==='en'?'Option B: CLI on EC2':'方式 B：EC2 命令行'}</strong><div class="cb">aws ssm start-session --target &lt;INSTANCE_ID&gt; --region &lt;REGION&gt;\nsudo su - ubuntu\nopenclaw tui          # → Channels\nopenclaw channels list  # verify</div></div></div>`+an('📚','s',`${lang==='en'?'Full channel docs:':'完整通道文档：'} <strong>https://docs.openclaw.ai/channels</strong>`,'')}},

{id:'sec',en:'Security Center — Defense in Depth',zh:'安全中心 — 纵深防御',de:'Runtimes, tool permissions, guardrails, infrastructure.',dz:'运行时、工具权限、护栏、基础设施。',
h(){return wb('','',
'SOUL rules say what agents <strong>should</strong> do. Security Center enforces what they <strong>can</strong> do. Multiple independent layers: runtimes define sandboxed environments, tool permissions control shell/browser/file access per position, Bedrock Guardrails filter content at the model level. This is <strong>defense-in-depth</strong> — like a bank vault with lock + alarm + guard. Even if one layer fails, others hold.',
'SOUL 规则说明 Agent <strong>应该</strong>做什么，安全中心强制执行 Agent <strong>能</strong>做什么。多层独立防护：运行时定义沙箱环境，工具权限按岗位控制 shell/浏览器/文件访问，Bedrock 护栏在模型层过滤内容。这是<strong>纵深防御</strong> — 像银行保险库：锁 + 警报 + 保安。即使一层失效，其他层仍然有效。'
)+an('📍','i',`<strong>${lang==='en'?'Navigate to:':'导航到：'}</strong> Security Center`,'<strong>导航到：</strong> Security Center'
)+mk(lang==='en'?'Security Center':'安全中心',`<div class="mtb"><div class="mti a">Agent Runtimes</div><div class="mti">Policies</div><div class="mti">Infrastructure</div></div><div style="font-size:12px;font-weight:600;margin-bottom:8px">${lang==='en'?'Defense Layers:':'防护层次：'}</div><div style="display:flex;flex-direction:column;gap:4px">${[['L4','Runtime','Isolated Firecracker microVM per tenant','var(--primary)'],['L3','Guardrail','Bedrock content filtering','var(--cyan)'],['L2','Permission','Tool allowlist per position','var(--success)'],['L1','SOUL','Prompt-level rules','var(--warn)']].map(([l,n,d,c])=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;background:var(--bg);font-size:11px"><span style="color:${c};font-weight:700;width:24px">${l}</span><span style="font-weight:500;min-width:80px">${n}</span><span style="color:var(--tm)">${d}</span></div>`).join('')}</div>`)}},

{id:'play',en:'Playground — AI Staging',zh:'Playground — AI 预发布',de:'Test agents as different employees before rolling out changes.',dz:'在正式发布前以不同员工身份测试 Agent。',
h(){return wb('','',
'Before rolling out a new SOUL or skill to 100 agents, <strong>test it as a specific employee</strong>. Inspect the final assembled workspace files — see exactly what markdown the agent receives. This removes guesswork: you know exactly what the agent sees, so you can <strong>debug behavior issues before employees encounter them</strong>.',
'在将新 SOUL 或技能推送给 100 个 Agent 之前，<strong>模拟特定员工测试</strong>。检查最终组装的工作区文件 — 精确查看 Agent 接收到的内容。消除猜测：您确切知道 Agent 看到了什么，因此可以<strong>在员工遇到问题之前调试行为</strong>。'
)+an('📍','i',`<strong>${lang==='en'?'Navigate to:':'导航到：'}</strong> Playground`,'<strong>导航到：</strong> Playground'
)+mk('Agent Playground',`<div style="display:flex;gap:14px"><div style="flex:1"><div style="font-size:11px;font-weight:600;margin-bottom:6px">${lang==='en'?'Tenant Context':'租户上下文'}</div><select class="mi"><option>Carol Zhang — Finance Analyst</option></select><div style="font-size:9px;color:var(--success);margin-bottom:10px">● Live · AgentCore</div><div style="background:var(--bg);border-radius:8px;padding:10px;min-height:120px;font-size:11px"><div style="background:rgba(99,102,241,.08);border-radius:6px;padding:6px;margin-bottom:6px"><strong>You:</strong> who are you?</div><div style="background:var(--surface);border-radius:6px;padding:6px"><strong>Agent:</strong> ${lang==='en'?"I'm Carol's AI assistant, a Finance Analyst at ACME Corp...":"我是 Carol 的 AI 助手，ACME Corp 的财务分析师..."}</div></div></div><div style="width:180px"><div class="mtb"><div class="mti a">Pipeline</div><div class="mti">Files</div></div><div style="font-size:10px;color:var(--tm)"><div style="margin-bottom:4px"><strong>Profile:</strong> basic</div><div style="margin-bottom:4px"><strong>Tools:</strong> web_search, file</div><div><strong style="color:var(--danger)">Blocked:</strong> shell, code_exec</div></div></div></div>`
)+an('🧪','s',lang==='en'?'<strong>Test:</strong> 1) "who are you?" → verify identity. 2) "run git status" as Finance → refused. 3) Switch to SDE → executes.':'<strong>测试：</strong>1）"who are you?" → 验证身份。2）以 Finance 身份 "run git status" → 被拒绝。3）切换到 SDE → 可执行。','')}},

{id:'mon',en:'Monitor — Eyes on the Fleet',zh:'监控 — 车队之眼',de:'Live sessions, agent health, runtime events, alert rules.',dz:'实时会话、Agent 健康、运行时事件、告警规则。',
h(){return wb('','',
'Without monitoring you\'re <strong>flying blind</strong> — you wouldn\'t know if an agent is stuck, overloaded, or giving bad answers until someone complains. Live sessions show who\'s talking now. Runtime events show container lifecycle (idle containers still cost money). Alert rules let you set thresholds — <strong>know before your users do</strong>.',
'没有监控就是<strong>盲飞</strong> — 您不会知道 Agent 是否卡住、过载或给出错误答案，直到有人投诉。实时会话显示谁在对话。运行时事件显示容器生命周期（空闲容器仍产生费用）。告警规则让您设置阈值 — <strong>在用户之前发现问题</strong>。'
)+an('📍','i',`<strong>${lang==='en'?'Navigate to:':'导航到：'}</strong> Monitor`,'<strong>导航到：</strong> Monitor'
)+mk(lang==='en'?'Monitor':'监控',`<div class="sg"><div class="ss"><div class="v" style="color:var(--success)">3</div><div class="l">${lang==='en'?'Active Sessions':'活跃会话'}</div></div><div class="ss"><div class="v">8</div><div class="l">${lang==='en'?'Online Agents':'在线 Agent'}</div></div><div class="ss"><div class="v">142</div><div class="l">${lang==='en'?'Turns Today':'今日轮次'}</div></div><div class="ss"><div class="v">⭐4.2</div><div class="l">${lang==='en'?'Avg Quality':'平均质量'}</div></div></div><table class="mt"><tr><th>Agent</th><th>Employee</th><th>Channel</th><th>Turns</th><th>Status</th></tr><tr><td>carol-fa</td><td>Carol Zhang</td><td>Slack</td><td>12</td><td><span class="bg gn">Active</span></td></tr><tr><td>ryan-sde</td><td>Ryan Park</td><td>Discord</td><td>8</td><td><span class="bg gn">Active</span></td></tr><tr><td>dickson-exec</td><td>Dickson Lee</td><td>Telegram</td><td>23</td><td><span class="bg gn">Active</span></td></tr></table>`)}},
],
emp:[
{id:'el',en:'Login to Employee Portal',zh:'登录员工门户',de:'Employees see a simplified interface — just your personal AI assistant.',dz:'员工看到的是简化界面 — 只有个人 AI 助手。',
h(){return wb('','',

]};

function L(l){lang=l;document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('a',b.textContent.includes(l==='en'?'English':'中文')));U();}
function R(r){role=r;step=0;document.querySelectorAll('.rtb').forEach(t=>t.classList.remove('a'));document.getElementById(r==='admin'?'ra':'re').classList.add('a');U();}
function G(i){step=i;U();window.scrollTo({top:200,behavior:'smooth'});}
function P(){if(step>0)G(step-1);}
function N(){if(step<S[role].length-1)G(step+1);}
function U(){
  const t=T[lang];
  document.getElementById('ht').textContent=t.t;
  document.getElementById('hp').textContent=t.d;
  document.getElementById('ra').textContent=t.admin;
  document.getElementById('re').textContent=t.emp;
  document.getElementById('bp').innerHTML=lang==='en'?'← Previous':'← 上一步';
  document.getElementById('bn').innerHTML=lang==='en'?'Next →':'下一步 →';
  document.getElementById('bp').disabled=step===0;
  document.getElementById('bn').disabled=step===S[role].length-1;
  const steps=S[role];
  document.getElementById('pb').innerHTML=steps.map((s,i)=>`<div class="ps ${i===step?'a':''} ${i<step?'d':''}" onclick="G(${i})"><span class="sn">${i<step?'✓':i+1}</span><span class="sl">${(lang==='en'?s.en:s.zh).split(/[—–]/)[0].trim().split(' ').slice(0,2).join(' ')}</span></div>`).join('');
  document.getElementById('sc').innerHTML=steps.map((s,i)=>`<div class="sc ${i===step?'a':''}"><div class="sk"><div class="st">${lang==='en'?s.en:s.zh}</div><div class="sd">${lang==='en'?s.de:s.dz}</div>${s.h()}</div></div>`).join('');
}
U();
</script>
