'portal-chat': { en:{title:'Portal Chat',sub:'Code audit: portal.py (836 lines). 12 verified findings across chat, pairing, profile, upload.'}, zh:{title:'Portal 对话',sub:'代码审计：portal.py（836 行）。12 项已验证发现，覆盖对话、配对、档案、上传。'}, body(){ return intent(
      t(
        '<strong>90% of employee time is here.</strong> First message ~6s (cold start). Agent knows your role from SOUL, remembers via MEMORY.md. Our audit of <code>portal.py</code> (836 lines) found: chat creates audit entry per message (DynamoDB write amplification), always-on detection adds SSM call per chat request, fallback mode reads 3 S3 files synchronously, and upload has no file size limit.',
        '<strong>员工 90% 时间在这里。</strong>首条消息约 6 秒。审计 <code>portal.py</code>（836 行）发现：每条消息创建审计条目（DynamoDB 写入放大），always-on 检测每次请求查 SSM，降级模式同步读 3 个 S3 文件，上传无文件大小限制。'
      )
    )
    + note('info','📍',t('<strong>Portal → Chat.</strong> Shows source: agentcore / always-on / fallback (offline).','<strong>Portal → Chat。</strong>显示来源：agentcore / always-on / fallback（离线）。'))
    + sectionHead(t('Chat Flow (Verified)','对话流程（已验证）'))
    + `<div class="code">${t(
      'portal.py:391-473 — portal_chat(body, authorization)\n  1. require_auth() → JWT → emp_id [line 394]\n  2. Find BIND# where mode="1:1" [line 397-400]\n  3. POST localhost:8090/route { channel:"portal", user_id:emp_id } [lines 406-410]\n     → 180s timeout\n  4. On success: create AUDIT# entry (agent_invocation) [lines 422-431]\n  5. Always-on detection: SSM get_parameter() per request [lines 436-442]\n     ⚠ SSM call AFTER success — adds latency to every chat response\n  6. On failure: fallback — read 3 S3 files [lines 458-460]\n     → global SOUL.md + position SOUL.md + USER.md\n     → Return static offline message with context metadata',
      'portal.py:391-473 — portal_chat(body, authorization)\n  1. require_auth() → JWT → emp_id [行 394]\n  2. 查找 BIND#（mode="1:1"）[行 397-400]\n  3. POST localhost:8090/route [行 406-410]\n     → 180s 超时\n  4. 成功时：创建 AUDIT#（agent_invocation）[行 422-431]\n  5. Always-on 检测：每次请求查 SSM [行 436-442]\n     ⚠ SSM 调用在成功之后——每次对话响应增加延迟\n  6. 失败时：降级——读取 3 个 S3 文件 [行 458-460]\n     → 返回含上下文元数据的静态离线消息'
    )}</div>`
    + deep(
      '<h4>Code-Verified Audit Findings (portal.py, 836 lines)</h4><p style="color:var(--danger);font-weight:600">CRITICAL</p><div style="border-left:3px solid var(--danger);padding-left:12px;margin:8px 0;font-size:12px;color:var(--text-s);line-height:1.8"><p><strong>#1 pair-complete has NO auth check — relies on network isolation.</strong> File: <code>portal.py:269-331</code>. Comment says "No auth — called from internal network only (H2 Proxy on same EC2)". But endpoint is exposed on port 8099 (admin console). If EC2 security group allows port 8099 from VPC, any VPC resource can call pair-complete with a valid token to bind any IM account to any employee. Should at minimum validate source IP is localhost.</p><p><strong>#2 Upload has NO file size limit.</strong> File: <code>portal.py:334-388</code>. <code>raw = await file.read()</code> — reads entire upload into memory. No <code>max_size</code> check. A 1GB upload would exhaust EC2 memory. Text preview limited to 8KB (<code>:360</code>) but full file stored in S3 regardless.</p><p><strong>#3 Portal channels endpoint leaks gateway token.</strong> File: <code>portal.py:783-784</code>. <code>return {"gatewayToken": gw_token, "dashboardToken": dashboard_token}</code>. For always-on agents, the endpoint returns gateway and dashboard tokens directly to the frontend. These are SSM SecureString values. Any employee with always-on mode gets the tokens — can authenticate directly to their agent\'s Gateway UI.</p></div><p style="color:var(--warn);font-weight:600">HIGH</p><div style="border-left:3px solid var(--warn);padding-left:12px;margin:8px 0;font-size:12px;color:var(--text-s);line-height:1.8"><p><strong>#4 Always-on detection adds SSM call per chat.</strong> <code>portal.py:436-442</code>. After every successful chat response, <code>ssm.get_parameter(Name=f"/tenants/{emp_id}/always-on-agent")</code>. For 100 concurrent users, that\'s 100 SSM reads/minute just for always-on detection. Should cache or read from DynamoDB.</p><p><strong>#5 Profile endpoint does 4 sequential S3 reads.</strong> <code>portal.py:476-532</code>. <code>portal_profile()</code> reads USER.md, MEMORY.md, then lists memory/ files, then checks SSM for always-on, then loops dedicated bots. 4+ network calls per profile view.</p><p><strong>#6 USER.md edit has no sanitization.</strong> <code>portal.py:535-550</code>. <code>s3ops.write_file(f"{user.employee_id}/workspace/USER.md", body.userMd)</code>. Raw user input written directly to S3. Markdown injection (e.g., <code># Ignore all previous instructions</code>) persists in workspace and gets merged into SOUL by workspace_assembler.</p><p><strong>#7 Portal skills uses fragile string matching.</strong> <code>portal.py:589</code>. <code>s.get("name", s.get("id", "")).replace("sk-", "") in agent_skills</code>. Strips "sk-" prefix then checks membership. If skill ID format changes, matching breaks silently. Restricted skills determined by exclusion — not explicit deny list.</p></div><p style="color:var(--text-m);font-weight:600">DESIGN</p><div style="border-left:3px solid var(--text-m);padding-left:12px;margin:8px 0;font-size:12px;color:var(--text-s);line-height:1.8"><p><strong>#8</strong> SSM user-mapping reverse lookup scans ALL parameters (<code>:111-124</code>: <code>get_parameters_by_path(MaxResults=10)</code>) — only checks first 10 mappings. <strong>#9</strong> Portal requests matching is fragile (<code>:600-601</code>: <code>tenantId.endswith(emp_id.replace("emp-",""))</code>). <strong>#10</strong> Export endpoint has no auth check (<code>:814-835</code>: <code>export_agent()</code>). <strong>#11</strong> Pair token is 12 uppercase alphanumeric chars (<code>:175</code>) — 36^12 space, adequate but short for high-security. <strong>#12</strong> Channel disconnect does dual SSM+DynamoDB delete (<code>:639-677</code>) but SSM delete failure is silent — stale SSM mapping may persist.</p></div>',
      '<h4>代码验证的审计发现（portal.py，836 行）</h4><p style="color:var(--danger);font-weight:600">关键</p><div style="border-left:3px solid var(--danger);padding-left:12px;margin:8px 0;font-size:12px;color:var(--text-s);line-height:1.8"><p><strong>#1 pair-complete 无认证——依赖网络隔离。</strong><code>portal.py:269-331</code>。端点暴露在 8099 端口。VPC 内任何资源可调用。应至少验证来源 IP 为 localhost。</p><p><strong>#2 上传无文件大小限制。</strong><code>portal.py:334-388</code>。<code>await file.read()</code> 读取全部到内存。1GB 上传耗尽 EC2 内存。</p><p><strong>#3 Portal channels 端点泄露 gateway token。</strong><code>portal.py:783-784</code>。Always-on 员工获得 gatewayToken + dashboardToken。可直接认证到 Agent Gateway UI。</p></div><p style="color:var(--warn);font-weight:600">高</p><div style="border-left:3px solid var(--warn);padding-left:12px;margin:8px 0;font-size:12px;color:var(--text-s);line-height:1.8"><p><strong>#4</strong> Always-on 检测每次聊天查 SSM（<code>:436-442</code>）。<strong>#5</strong> Profile 4 次顺序 S3 读取（<code>:476-532</code>）。<strong>#6</strong> USER.md 编辑无净化（<code>:535-550</code>）——markdown 注入持久化。<strong>#7</strong> 技能匹配用脆弱字符串替换（<code>:589</code>）。</p></div><p style="color:var(--text-m);font-weight:600">设计</p><div style="border-left:3px solid var(--text-m);padding-left:12px;margin:8px 0;font-size:12px;color:var(--text-s);line-height:1.8"><p><strong>#8</strong> SSM 映射反向查找仅检查前 10 条。<strong>#9</strong> 请求匹配脆弱。<strong>#10</strong> 导出端点无认证。<strong>#11</strong> 配对令牌 12 字符。<strong>#12</strong> 断开连接 SSM 删除失败静默。</p></div>'
    ); }},


'portal-im': { en:{title:'Connect IM — Chat Anywhere',sub:'Self-service pairing: QR → /start → BIND.'}, zh:{title:'连接 IM — 随时随地对话',sub:'自助配对：QR → /start → BIND。'}, body(){ return intent('Use your agent <strong>without opening the portal</strong>. Pairing = two-factor auth: portal knows who you are, /start TOKEN proves the IM account is yours.','<strong>无需打开门户</strong>使用 Agent。配对 = 双因素认证：门户知道你是谁，/start TOKEN 证明 IM 账户属于你。') + steps(t('3-step pairing:','3 步配对：'),t(['Portal → Connect IM → click "Connect" on Feishu → get token + QR','Open Feishu, find company bot, send <code>/start TOKEN</code>','Bot: "Linking to [Name · Position]. Reply BIND" → send <strong>BIND</strong> → Done!'],['Portal → Connect IM → 点击飞书"Connect" → 获取令牌 + QR','打开飞书，找到公司 bot，发送 <code>/start TOKEN</code>','Bot："绑定 [姓名 · 岗位]。回复 BIND" → 发送 <strong>BIND</strong> → 完成！']))
    + deep(`
<h4>3-Step Pairing Implementation</h4>
<div class="code">Step 1: Portal → pair-start → PAIR# token in DynamoDB → return QR + token
Step 2: Feishu /start TOKEN → H2 Proxy PATH C → pair-pending API → "Reply BIND"
Step 3: BIND → pair-complete API → DynamoDB MAPPING# created → cache cleared</div>
<h4>Key: H2 Proxy word boundary matching</h4>
<p>BIND matched with <code>\bBIND\b</code> not <code>^BIND$</code> because Gateway wraps user text in metadata blocks. QR deep link reads appId dynamically from Gateway's openclaw.json.</p>
`,`
<h4>3 步配对实现</h4>
<div class="code">步骤 1: Portal → pair-start → DynamoDB PAIR# 令牌 → 返回 QR + 令牌
步骤 2: 飞书 /start TOKEN → H2 Proxy PATH C → pair-pending API → "回复 BIND"
步骤 3: BIND → pair-complete API → DynamoDB MAPPING# 创建 → 缓存清除</div>
<h4>关键：H2 Proxy 单词边界匹配</h4>
<p>BIND 用 <code>\bBIND\b</code> 而非 <code>^BIND$</code> 匹配，因为 Gateway 将用户文本包装在 metadata 块中。QR 深链接从 Gateway 的 openclaw.json 动态读取 appId。</p>
`); }},

'portal-profile': { en:{title:'My Profile',sub:'Edit USER.md — personal SOUL layer.'}, zh:{title:'我的档案',sub:'编辑 USER.md — 个人 SOUL 层。'}, body(){ return intent('Make the agent <strong>"yours"</strong>. Working style, response format, timezone. <strong>Doesn\'t override company rules</strong>, adds preferences on top.','让 Agent <strong>"变成你的"</strong>。工作风格、响应格式、时区。<strong>不覆盖公司规则</strong>，在其上添加偏好。') + note('info','📍',t('<strong>Portal → My Profile.</strong> Edit USER.md directly. Changes on next session.','<strong>Portal → My Profile。</strong>直接编辑 USER.md。下次会话生效。')); }},

// ═══ HELPER FUNCTIONS ═══
function t(en, zh) { return lang === 'en' ? en : zh; }

function intent(en, zh) {
  return `<div class="intent"><div class="intent-head" onclick="this.parentElement.classList.toggle('closed')">💡 ${t('Design Intent','设计意图')}</div><div class="intent-body">${t(en,zh)}</div></div>`;
}

function sectionHead(text) {
  return `<div class="section-head">${text}</div>`;
}

function card(title, body) {
  return `<div class="card"><div class="card-head">${title}</div><div class="card-body">${body}</div></div>`;
}

function note(type, icon, text) {
  return `<div class="note ${type}"><span class="note-icon">${icon}</span><div class="note-text">${text}</div></div>`;
}

function flow(items) {
  let html = '<div class="flow">';
  for (let i = 0; i < items.length; i += 2) {
    const text = items[i], cls = items[i+1] || '';
    if (text === '') continue;
    if (i > 0 && items[i-1] !== '') html += '<span class="flow-arrow">→</span>';
    html += `<div class="flow-node ${cls}">${text.replace(/\n/g,'<br>')}</div>`;
  }
  return html + '</div>';
}

function deep(en, zh) {
  return `<div class="deep"><div class="deep-head" onclick="this.parentElement.classList.toggle('open')">🔬 ${t('Technical Details','技术细节')}</div><div class="deep-body">${t(en,zh)}</div></div>`;
}

function steps(title, items) {
  const list = Array.isArray(items) ? items : [items];
  return `<div class="steps"><div style="font-size:13px;font-weight:600;margin-bottom:8px">${title}</div>${list.map((s,i)=>`<div class="step-item"><span class="step-num">${i+1}</span><span class="step-text">${s}</span></div>`).join('')}</div>`;
}

// ═══ RENDER ═══
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.trim() === (l==='en'?'EN':'中文')));
  render();
}

function navigate(id) {
  activePage = id;
  render();
  document.getElementById('main').scrollTop = 0;
}

function render() {
  // Rail
  let railHtml = '';
  NAV.forEach(g => {
    railHtml += `<div class="rail-group"><div class="rail-label">${g.group[lang]}</div>`;
    g.items.forEach(item => {
      railHtml += `<div class="rail-item ${item.id===activePage?'active':''}" onclick="navigate('${item.id}')"><span class="rail-icon">${item.icon}</span><span class="rail-text">${item[lang]}</span></div>`;
    });
    railHtml += '</div>';
  });
  document.getElementById('rail').innerHTML = railHtml;

  // Content
  const page = PAGES[activePage];
  if (!page) return;
  const info = page[lang] || page.en;
  document.getElementById('main').innerHTML = `<div class="page active"><div class="page-title">${info.title}</div><div class="page-sub">${info.sub}</div>${page.body()}</div>`;
}

render();
</script>
