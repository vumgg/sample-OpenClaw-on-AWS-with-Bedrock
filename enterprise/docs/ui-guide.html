<style>
:root {
  --bg: #08090d;
  --surface: #111318;
  --surface2: #181b23;
  --card: #1c1f2a;
  --border: #252838;
  --border-l: #333750;
  --primary: #7c6cff;
  --primary-dim: rgba(124,108,255,.08);
  --primary-glow: rgba(124,108,255,.15);
  --pl: #a599ff;
  --success: #34d399;
  --success-dim: rgba(52,211,153,.08);
  --warn: #fbbf24;
  --warn-dim: rgba(251,191,36,.06);
  --danger: #f87171;
  --cyan: #22d3ee;
  --cyan-dim: rgba(34,211,238,.08);
  --text: #e8eaf0;
  --text-s: #a0a6b8;
  --text-m: #6b7280;
  --rail-w: 76px;
  --top-h: 52px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',system-ui,sans-serif; background:var(--bg); color:var(--text); line-height:1.65; overflow:hidden; height:100vh; }

/* ═══ TOP BAR ═══ */
.topbar {
  position:fixed; top:0; left:0; right:0; height:var(--top-h); z-index:100;
  background:rgba(8,9,13,.85); backdrop-filter:blur(20px); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 20px; gap:16px;
}
.topbar .logo { display:flex; align-items:center; gap:10px; width:var(--rail-w); justify-content:center; }
.topbar .logo svg { width:28px; height:28px; }
.topbar .logo-text { font-weight:700; font-size:14px; letter-spacing:-.3px; color:var(--pl); }
.topbar .spacer { flex:1; }
.lang-toggle { display:flex; gap:2px; background:var(--surface2); border-radius:8px; padding:2px; }
.lang-btn { padding:4px 14px; border-radius:6px; border:none; background:none; color:var(--text-m); font-size:12px; font-family:inherit; cursor:pointer; transition:.2s; }
.lang-btn.active { background:var(--primary); color:#fff; }

/* ═══ NAVIGATION RAIL (M3 style) ═══ */
.rail {
  position:fixed; left:0; top:var(--top-h); bottom:0; width:var(--rail-w); z-index:90;
  background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; padding:8px 0; overflow-y:auto;
  scrollbar-width:none;
}
.rail::-webkit-scrollbar { display:none; }
.rail-group { padding:4px 0; }
.rail-group + .rail-group { border-top:1px solid var(--border); margin-top:4px; }
.rail-label { font-size:8px; text-transform:uppercase; letter-spacing:.8px; color:var(--text-m); text-align:center; padding:6px 4px 2px; font-weight:600; }
.rail-item {
  display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:8px 4px 6px; margin:1px 6px; border-radius:12px; cursor:pointer;
  transition:all .2s; position:relative; text-decoration:none; color:var(--text-m);
}
.rail-item:hover { background:var(--primary-dim); color:var(--text-s); }
.rail-item.active { background:var(--primary-glow); color:var(--pl); }
.rail-item.active::before {
  content:''; position:absolute; left:-6px; top:50%; transform:translateY(-50%);
  width:3px; height:20px; background:var(--primary); border-radius:0 3px 3px 0;
}
.rail-icon { width:20px; height:20px; display:flex; align-items:center; justify-content:center; }
.rail-icon svg { width:18px; height:18px; }
.rail-text { font-size:8.5px; font-weight:500; text-align:center; line-height:1.2; max-width:64px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* ═══ MAIN CONTENT ═══ */
.main {
  position:fixed; left:var(--rail-w); top:var(--top-h); right:0; bottom:0;
  overflow-y:auto; padding:32px 40px 80px; scroll-behavior:smooth;
}
.main::-webkit-scrollbar { width:6px; }
.main::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

.page { display:none; max-width:860px; animation:fadeIn .3s ease; }
.page.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

/* ═══ CONTENT ELEMENTS ═══ */
.page-title { font-size:28px; font-weight:700; letter-spacing:-.5px; margin-bottom:4px; }
.page-sub { font-size:14px; color:var(--text-s); margin-bottom:28px; }

.section { margin-bottom:28px; }
.section-head {
  font-size:15px; font-weight:600; padding-left:12px; margin-bottom:12px;
  border-left:3px solid var(--primary); color:var(--text);
}

/* Design Intent */
.intent {
  border:1px solid rgba(251,191,36,.12); background:var(--warn-dim);
  border-radius:12px; margin:16px 0; overflow:hidden;
}
.intent-head {
  display:flex; align-items:center; gap:8px; padding:12px 16px;
  cursor:pointer; font-size:13px; font-weight:600; color:var(--warn); user-select:none;
}
.intent-head::after { content:'▾'; margin-left:auto; font-size:10px; transition:.2s; }
.intent.closed .intent-head::after { transform:rotate(-90deg); }
.intent-body { padding:0 16px 14px; font-size:13px; color:var(--text-s); line-height:1.75; }
.intent.closed .intent-body { display:none; }

/* Cards */
.card {
  background:var(--card); border:1px solid var(--border); border-radius:12px;
  overflow:hidden; margin:14px 0;
}
.card-head {
  background:var(--surface2); padding:10px 16px; border-bottom:1px solid var(--border);
  font-size:12px; font-weight:600; display:flex; align-items:center; gap:8px;
}
.card-body { padding:16px; }

/* Annotations */
.note {
  display:flex; align-items:flex-start; gap:10px; border-radius:10px;
  padding:12px 16px; margin:12px 0; font-size:12.5px; line-height:1.6;
}
.note.info { background:var(--primary-dim); border:1px solid rgba(124,108,255,.15); }
.note.ok { background:var(--success-dim); border:1px solid rgba(52,211,153,.15); }
.note.warn { background:var(--warn-dim); border:1px solid rgba(251,191,36,.15); }
.note.tip { background:var(--cyan-dim); border:1px solid rgba(34,211,238,.15); }
.note-icon { font-size:16px; flex-shrink:0; margin-top:1px; }
.note-text { flex:1; }
.note-text strong { color:var(--text); }

/* Code */
.code {
  background:var(--bg); border:1px solid var(--border); border-radius:8px;
  padding:12px 14px; font-family:'JetBrains Mono',monospace; font-size:11.5px;
  color:var(--text-s); white-space:pre-wrap; margin:8px 0; overflow-x:auto; line-height:1.7;
}

/* Flow chain */
.flow { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin:10px 0; }
.flow-node {
  padding:6px 12px; border-radius:8px; font-size:11px; font-weight:600;
  border:1px solid var(--border); background:var(--surface2); text-align:center;
}
.flow-node.p { background:var(--primary-dim); border-color:rgba(124,108,255,.3); color:var(--pl); }
.flow-node.s { background:var(--success-dim); border-color:rgba(52,211,153,.3); color:var(--success); }
.flow-node.c { background:var(--cyan-dim); border-color:rgba(34,211,238,.3); color:var(--cyan); }
.flow-node.d { background:rgba(248,113,113,.06); border-color:rgba(248,113,113,.2); color:var(--danger); }
.flow-arrow { color:var(--text-m); font-size:12px; }

/* Steps */
.steps { margin:12px 0; }
.step-item {
  display:flex; gap:10px; margin-bottom:8px; font-size:12.5px;
}
.step-num {
  width:22px; height:22px; border-radius:50%; background:var(--primary);
  color:#fff; display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; flex-shrink:0; margin-top:1px;
}
.step-text { color:var(--text-s); flex:1; }

/* Tables */
.tbl { width:100%; border-collapse:collapse; font-size:12px; margin:8px 0; }
.tbl th { text-align:left; padding:8px 10px; color:var(--text-m); font-size:10px; text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); font-weight:600; }
.tbl td { padding:8px 10px; border-bottom:1px solid rgba(37,40,56,.6); }
.tbl tr:nth-child(even) td { background:rgba(255,255,255,.01); }

/* Badges */
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:600; }
.badge.green { background:rgba(52,211,153,.12); color:var(--success); }
.badge.yellow { background:rgba(251,191,36,.12); color:var(--warn); }
.badge.blue { background:rgba(124,108,255,.12); color:var(--pl); }
.badge.cyan { background:rgba(34,211,238,.12); color:var(--cyan); }

/* Stats grid */
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:12px 0; }
.stat { text-align:center; padding:12px; background:var(--surface2); border-radius:10px; border:1px solid var(--border); }
.stat-v { font-size:22px; font-weight:700; }
.stat-l { font-size:9px; color:var(--text-m); margin-top:2px; }

/* Separator */
.sep { border-top:1px solid var(--border); margin:20px 0; }

/* Grid helpers */
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

/* Technical Deep Dive */
.deep {
  border:1px solid rgba(124,108,255,.15); background:rgba(124,108,255,.03);
  border-radius:12px; margin:20px 0; overflow:hidden;
}
.deep-head {
  display:flex; align-items:center; gap:8px; padding:12px 16px;
  cursor:pointer; font-size:13px; font-weight:600; color:var(--pl); user-select:none;
  background:rgba(124,108,255,.05);
}
.deep-head::after { content:'▸ expand'; margin-left:auto; font-size:10px; font-weight:400; color:var(--text-m); transition:.2s; }
.deep.open .deep-head::after { content:'▾ collapse'; }
.deep-body { display:none; padding:16px; font-size:12.5px; color:var(--text-s); line-height:1.7; }
.deep.open .deep-body { display:block; }
.deep-body h4 { color:var(--pl); font-size:13px; margin:14px 0 6px; font-weight:600; }
.deep-body h4:first-child { margin-top:0; }
.deep-body .code { font-size:10.5px; }
.deep-body .tbl { font-size:11px; }
</style>
</head>

        '<p><strong style="color:var(--pl)">① Gateway</strong> (port 18789) — Receives IM webhooks. Manages bot connections. Runs a local agent that calls Bedrock for every message.</p><p><strong style="color:var(--cyan)">② H2 Proxy</strong> (port 8091) — Intercepts ALL Bedrock calls. The "brain" of multi-tenancy: extracts sender identity, checks binding, handles pairing, routes to Tenant Router. Unbound users get rejection.</p><p><strong style="color:var(--success)">③ Tenant Router</strong> (port 8090) — Resolves: IM user → MAPPING# → employee → position → AgentCore Runtime. Creates stable tenant IDs for session persistence.</p><p><strong style="color:var(--danger)">④ AgentCore</strong> — Isolated Firecracker microVM per employee. Runs workspace_assembler (3-layer SOUL merge) + full OpenClaw agent CLI. Auto-terminates after idle timeout.</p><p><strong>⑤ Bedrock</strong> — LLM inference. Nova 2 Lite default ($0.30/1M), Claude Sonnet for executives, per-position configurable.</p>',
        '<p><strong style="color:var(--pl)">① Gateway</strong>（端口 18789）— 接收 IM webhook。管理 bot 连接。运行本地 agent 调用 Bedrock。</p><p><strong style="color:var(--cyan)">② H2 Proxy</strong>（端口 8091）— 拦截所有 Bedrock 调用。多租户"大脑"：提取发送者身份，检查绑定，处理配对，路由到 Tenant Router。</p><p><strong style="color:var(--success)">③ Tenant Router</strong>（端口 8090）— 解析：IM 用户 → MAPPING# → 员工 → 岗位 → AgentCore Runtime。创建稳定 tenant ID。</p><p><strong style="color:var(--danger)">④ AgentCore</strong> — 每员工隔离 Firecracker VM。运行 workspace_assembler（三层 SOUL 合并）+ 完整 OpenClaw agent CLI。空闲后自动终止。</p><p><strong>⑤ Bedrock</strong> — LLM 推理。Nova 2 Lite 默认，Claude Sonnet 高管用，可按岗位配置。</p>'
      )
      + '</div>'
    )
    + sectionHead(t('SOUL 3-Layer Identity','SOUL 三层身份'))
    + flow(['🔒 Global\n'+t('Company rules','公司规则'),'d','✏️ Position\n'+t('Role expertise','角色专长'),'p','✏️ Personal\n'+t('Preferences','偏好'),'s','= Merged\n'+t('Agent reads','Agent 读取'),'c'])
    + sectionHead(t('Serverless vs Always-on','Serverless vs Always-on'))
    + '<table class="tbl"><tr><th></th><th>Serverless</th><th>Always-on (Fargate)</th></tr>'
    + '<tr><td>'+t('Cold start','冷启动')+'</td><td>~6s</td><td>'+t('None','无')+'</td></tr>'
    + '<tr><td>'+t('Cost','成本')+'</td><td>'+t('Pay per session','按会话')+'</td><td>~$50/mo</td></tr>'
    + '<tr><td>'+t('Memory','记忆')+'</td><td>'+t('S3 sync','S3 同步')+'</td><td>'+t('EFS persistent','EFS 持久')+'</td></tr>'
    + '<tr><td>'+t('Best for','适合')+'</td><td>'+t('Most employees','大部分员工')+'</td><td>'+t('Executives, scheduled tasks','高管、定时任务')+'</td></tr></table>'
    + deep(
      '<h4>DynamoDB Single-Table Design</h4><p>All data in one table (name = STACK_NAME), PK = "ORG#acme":</p><div class="code">EMP#{emp_id}        — Employee (positionId, agentId, channels[])\nPOS#{pos_id}        — Position (toolAllowlist, defaultSkills)\nAGENT#{agent_id}    — Agent (status, deployMode, qualityScore)\nBIND#{bind_id}      — Employee↔Agent binding (mode: "1:1")\nMAPPING#{ch}__{uid} — IM user → employee mapping\nCONFIG#{key}        — Settings (model, security, kb-assignments)\nSESSION#{tenant}    — Active session (turns, soulHash)\nUSAGE#{emp}#{date}  — Daily usage (tokens, cost)\nAUDIT#{id}          — Events (invocations, guardrail blocks)</div><h4>Environment Variable Flow</h4><div class="code">.env → deploy.sh → /etc/openclaw/env → systemd services\n                → AgentCore Runtime env vars → container os.environ\n\nKey: STACK_NAME, AWS_REGION, DYNAMODB_TABLE, S3_BUCKET, BEDROCK_MODEL_ID</div><h4>⚠️ Self-Audit: Architecture Risks</h4><ul style="font-size:12px;color:var(--text-s);line-height:1.8"><li><strong>Gateway is unaware of multi-tenancy:</strong> H2 Proxy adds it via man-in-the-middle. OpenClaw version upgrades must be tested against H2 Proxy message extraction (extractUserMessage depends on Converse API body format).</li><li><strong>Single EC2 = single point of failure:</strong> All IM + Admin Console on one instance. Production should consider ALB + multi-AZ.</li><li><strong>5-min config propagation:</strong> Global/Position SOUL changes polled every 5 min. Serverless agents unaffected (fresh VM). Always-on containers cache longer.</li><li><strong>S3 bucket global uniqueness:</strong> Same account, two regions → name conflict. Must set WORKSPACE_BUCKET_NAME.</li><li><strong>Cross-region Bedrock inference:</strong> "global." prefix models may route to different regions — latency varies.</li></ul>',
      '<h4>DynamoDB 单表设计</h4><p>所有数据在一个表中（名称 = STACK_NAME），PK = "ORG#acme"：</p><div class="code">EMP#{emp_id}        — 员工（positionId, agentId, channels[]）\nPOS#{pos_id}        — 岗位（toolAllowlist, defaultSkills）\nAGENT#{agent_id}    — Agent（状态、部署模式、质量分）\nBIND#{bind_id}      — 员工↔Agent 绑定\nMAPPING#{ch}__{uid} — IM 用户 → 员工映射\nCONFIG#{key}        — 设置（模型、安全、KB 分配）\nSESSION#{tenant}    — 活跃会话（轮次、soulHash）\nUSAGE#{emp}#{date}  — 每日用量（tokens、cost）\nAUDIT#{id}          — 事件（调用、护栏拦截）</div><h4>环境变量流</h4><div class="code">.env → deploy.sh → /etc/openclaw/env → systemd\n                → AgentCore Runtime env → 容器 os.environ</div><h4>⚠️ 自审：架构风险</h4><ul style="font-size:12px;color:var(--text-s);line-height:1.8"><li><strong>Gateway 不知道多租户：</strong>H2 Proxy 通过中间人添加。OpenClaw 版本升级须测试 H2 Proxy 消息提取。</li><li><strong>单 EC2 = 单点故障：</strong>所有 IM + Admin Console 在一个实例。生产应考虑 ALB + 多 AZ。</li><li><strong>5 分钟配置传播：</strong>Serverless 不受影响（新 VM）。Always-on 缓存更久。</li><li><strong>S3 桶名冲突：</strong>同账号多 region 需设 WORKSPACE_BUCKET_NAME。</li></ul>'
    );
  }
},

deploy: {
  en: { title:'Deploy with deploy.sh', sub:'One-command deployment: 8 automated steps, ~15 minutes, zero manual intervention.' },
  zh: { title:'使用 deploy.sh 部署', sub:'一键部署：8 个自动化步骤，约 15 分钟，零手动干预。' },
  body() {
    return intent(
      t(
        '<strong>Why one-command deployment?</strong> Enterprise customers need <strong>repeatability</strong>: the same script must produce identical results whether run by a senior architect or a first-day ops engineer. Manual multi-step deployments introduce human error — a typo in a DynamoDB table name, a forgotten IAM policy, a misconfigured VPC endpoint. <code>deploy.sh</code> encapsulates 8 complex AWS operations into one <strong>idempotent</strong> script. Re-running is always safe: it detects existing resources and updates only what changed. <strong>Security value:</strong> secrets (admin password, JWT key) are generated at deploy time and stored in SSM SecureString — never written to disk or committed to git. <strong>Operational value:</strong> the script validates prerequisites before creating any resources (AWS CLI version, Bedrock model access), preventing half-deployed stacks.',
        '<strong>为什么一键部署？</strong>企业客户需要<strong>可重复性</strong>：同一脚本无论高级架构师还是入职第一天的运维执行都必须产生相同结果。手动多步部署引入人为错误——DynamoDB 表名拼写错误、遗忘 IAM 策略、VPC 端点配置错误。<code>deploy.sh</code> 将 8 个复杂 AWS 操作封装为一个<strong>幂等</strong>脚本。重复运行始终安全：检测已有资源，只更新变化部分。<strong>安全价值：</strong>密钥（admin 密码、JWT 密钥）在部署时生成并存储在 SSM SecureString——永不写入磁盘或提交到 git。<strong>运维价值：</strong>脚本在创建任何资源之前验证前置条件（AWS CLI 版本、Bedrock 模型访问），防止半部署的 stack。'
      )
    )
    + sectionHead(t('Prerequisites','前置条件'))
    + '<table class="tbl"><tr><th>'+t('Requirement','要求')+'</th><th>'+t('Check','检查')+'</th><th>'+t('Min Version','最低版本')+'</th></tr>'
    + '<tr><td>AWS CLI</td><td><code>aws --version</code></td><td>>= 2.27 (AgentCore API)</td></tr>'
    + '<tr><td>Python</td><td><code>python3 --version</code></td><td>>= 3.10</td></tr>'
    + '<tr><td>SSM Plugin</td><td><code>session-manager-plugin</code></td><td>'+t('Latest','最新')+'</td></tr>'
    + '<tr><td>'+t('AWS Credentials','AWS 凭证')+'</td><td><code>aws sts get-caller-identity</code></td><td>'+t('Must succeed','必须成功')+'</td></tr></table>'
    + sectionHead(t('Quick Start','快速开始'))
    + '<div class="code">cd enterprise\ncp .env.example .env\n# '+t('Edit: STACK_NAME, REGION, ADMIN_PASSWORD','编辑：STACK_NAME, REGION, ADMIN_PASSWORD')+'\nbash deploy.sh</div>'
    + sectionHead(t('.env Configuration','.env 配置'))
    + '<table class="tbl"><tr><th>'+t('Variable','变量')+'</th><th>'+t('Required','必填')+'</th><th>'+t('Default','默认')+'</th><th>'+t('Notes','说明')+'</th></tr>'
    + '<tr><td><code>STACK_NAME</code></td><td>✅</td><td>openclaw</td><td>'+t('Names ALL resources. Unique per account/region.','命名所有资源。每账号/区域唯一。')+'</td></tr>'
    + '<tr><td><code>REGION</code></td><td>✅</td><td>us-east-1</td><td>'+t('Must have Bedrock + AgentCore','必须有 Bedrock + AgentCore')+'</td></tr>'
    + '<tr><td><code>ADMIN_PASSWORD</code></td><td>✅</td><td>—</td><td>'+t('Shared login password for all accounts','所有账户共享登录密码')+'</td></tr>'
    + '<tr><td><code>MODEL</code></td><td></td><td>global.amazon.nova-2-lite-v1:0</td><td>Bedrock model ID</td></tr>'
    + '<tr><td><code>INSTANCE_TYPE</code></td><td></td><td>c7g.large</td><td>Graviton ARM</td></tr>'
    + '<tr><td><code>WORKSPACE_BUCKET_NAME</code></td><td></td><td>'+t('auto','自动')+'</td><td>'+t('Set if multi-stack same account','同账号多 stack 时设置')+'</td></tr></table>'
    + sectionHead(t('8 Automated Steps','8 个自动化步骤'))
    + card(t('deploy.sh Execution','deploy.sh 执行流程'),
      [['1',t('Prerequisites','前置条件'),t('AWS CLI version + Bedrock model check','AWS CLI 版本 + Bedrock 模型检查'),'2s'],['2','CloudFormation',t('VPC, EC2, ECR, S3, IAM, ECS, EFS','VPC, EC2, ECR, S3, IAM, ECS, EFS'),'8 min'],['3','Docker Build',t('Agent container on EC2 → ECR push','EC2 构建 Agent 容器 → ECR 推送'),'10 min'],['4','AgentCore Runtime',t('Create runtime + pass env vars','创建运行时 + 传递环境变量'),'30s'],['5','S3 Templates',t('SOUL, skills, knowledge docs','SOUL、技能、知识文档'),'10s'],['6','DynamoDB Seed',t('20 employees, agents, bindings, roles, settings','20 员工、Agent、绑定、角色、设置'),'15s'],['7',t('Secrets + Env','密钥 + 环境'),t('SSM SecureString + /etc/openclaw/env','SSM SecureString + /etc/openclaw/env'),'10s'],['8','EC2 Services',t('Build React frontend + systemd services','构建 React 前端 + systemd 服务'),'2 min']].map(([n,name,desc,time])=>'<div style="display:flex;align-items:center;gap:10px;padding:5px 0;font-size:12px"><span style="background:var(--primary);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">'+n+'</span><span style="font-weight:600;min-width:120px">'+name+'</span><span style="color:var(--text-m);flex:1">'+desc+'</span><span class="badge green">'+time+'</span></div>').join('')
    )
    + sectionHead(t('Re-deploy Options','重新部署选项'))
    + '<div class="code">bash deploy.sh --skip-build      # '+t('Skip Docker (use existing image)','跳过 Docker（用现有镜像）')+'\nbash deploy.sh --skip-seed       # '+t('Skip DynamoDB seeding','跳过 DynamoDB 种子')+'\nbash deploy.sh --skip-services   # '+t('Skip service deployment','跳过服务部署')+'</div>'
    + sectionHead(t('Post-Deployment Verification','部署后验证'))
    + '<div class="code"># '+t('Check services','检查服务')+'\nsystemctl is-active openclaw-admin tenant-router bedrock-proxy-h2\n\n# '+t('Check ports','检查端口')+'\nss -tlnp | grep -E \'8090|8091|8099|18789\'\n\n# '+t('Check data','检查数据')+'\ncurl -s http://localhost:8099/api/v1/org/employees | \\\n  python3 -c "import json,sys; print(f\'Employees: {len(json.load(sys.stdin))}\')"</div>'
    + deep(
      '<h4>deploy.sh Internal Architecture</h4><p>File: <code>enterprise/deploy.sh</code> (~620 lines). Key design decisions:</p><ul style="font-size:12px;color:var(--text-s);line-height:1.8"><li><strong>Docker builds on EC2, not locally:</strong> Source tarball → S3 → EC2 pulls → builds ARM image → ECR push. You don\'t need Docker installed. The build uses the same Graviton ARM64 architecture as production.</li><li><strong>AgentCore Runtime env vars (Step 4):</strong> STACK_NAME, AWS_REGION, S3_BUCKET, DYNAMODB_TABLE, DYNAMODB_REGION, BEDROCK_MODEL_ID passed via <code>--environment-variables</code> flag. This is the ONLY way to configure the container — no .env file inside the image.</li><li><strong>ec2-setup.sh (Step 8):</strong> The critical final step. Builds React frontend (npm install + vite build), installs 3 systemd services, and injects <code>AWS_ENDPOINT_URL_BEDROCK_RUNTIME=http://localhost:8091</code> into Gateway service — connecting Gateway to H2 Proxy for multi-tenant routing.</li></ul><h4>CloudFormation Resources</h4><div class="code">VPC + Public Subnet + Internet Gateway + Route Table\nEC2 Instance (c7g.large Graviton, Ubuntu 24.04, SSM-managed)\nECR Repository (Docker image storage)\nS3 Bucket (versioned, for workspaces/SOUL/skills/knowledge)\nIAM Roles: EC2 instance role (SSM + S3 + DynamoDB + Bedrock)\n           AgentCore execution role (ECR + S3 + DynamoDB + Bedrock + CloudWatch)\nECS Cluster + Task Definition + Security Group (for Always-on agents)\nEFS File System + Mount Target (persistent storage for Always-on)\nCloudWatch Log Groups (agent + admin logs)</div><h4>⚠️ Self-Audit: Deployment Gotchas</h4><ul style="font-size:12px;color:var(--text-s);line-height:1.8"><li><strong>First deploy on new account may fail (ECS service linked role):</strong> New AWS accounts need ~30s for ECS role propagation. First CFN create may fail with "Unable to assume service linked role." Fix: wait, re-run. Second attempt always succeeds.</li><li><strong>S3 bucket name conflict (multi-region):</strong> Default name is <code>openclaw-tenants-{ACCOUNT_ID}</code>. Same account, two regions → conflict. Must set WORKSPACE_BUCKET_NAME.</li><li><strong>seed scripts need import os:</strong> After batch-replacing hardcoded defaults with <code>os.environ.get()</code>, all seed scripts must have <code>import os</code>. Missing this causes silent seed failure — DynamoDB table created but empty (no employees, no roles).</li><li><strong>JWT_SECRET regenerates on each deploy.sh run:</strong> Not stored in .env — generated fresh with <code>openssl rand -hex 32</code>. Re-deploying with --skip-seed still writes new JWT_SECRET to SSM, invalidating existing tokens. Employees must re-login.</li><li><strong>Docker image must be rebuilt after agent-container code changes:</strong> workspace_assembler.py, server.py, permissions.py are baked into the image. Code changes on EC2 admin-console don\'t affect the container — must rebuild with <code>deploy.sh --skip-seed</code>.</li></ul>',
      '<h4>deploy.sh 内部架构</h4><p>文件：<code>enterprise/deploy.sh</code>（约 620 行）。关键设计：</p><ul style="font-size:12px;color:var(--text-s);line-height:1.8"><li><strong>Docker 在 EC2 构建，非本地：</strong>源码打包 → S3 → EC2 拉取 → 构建 ARM 镜像 → ECR 推送。无需本地 Docker。</li><li><strong>AgentCore Runtime 环境变量（步骤 4）：</strong>通过 <code>--environment-variables</code> 传递。这是配置容器的唯一方式。</li><li><strong>ec2-setup.sh（步骤 8）：</strong>构建 React 前端，安装 systemd 服务，注入 <code>AWS_ENDPOINT_URL_BEDROCK_RUNTIME</code> 连接 Gateway 到 H2 Proxy。</li></ul><h4>CloudFormation 资源</h4><div class="code">VPC + 子网 + Internet Gateway + 路由表\nEC2 实例 (c7g.large Graviton, Ubuntu 24.04)\nECR 仓库 | S3 桶（版本化）\nIAM 角色：EC2 实例角色 + AgentCore 执行角色\nECS 集群 + 任务定义（Always-on 用）\nEFS 文件系统 | CloudWatch 日志组</div><h4>⚠️ 自审：部署陷阱</h4><ul style="font-size:12px;color:var(--text-s);line-height:1.8"><li><strong>新账号首次部署可能失败（ECS 角色）：</strong>新 AWS 账号需约 30 秒角色传播。重跑即可。</li><li><strong>S3 桶名冲突：</strong>同账号多 region 需设 WORKSPACE_BUCKET_NAME。</li><li><strong>seed 脚本需要 import os：</strong>缺失导致 seed 静默失败——表创建但空（无员工、无角色）。</li><li><strong>JWT_SECRET 每次 deploy 重新生成：</strong>重新部署使现有 token 失效。员工需重新登录。</li><li><strong>Docker 镜像必须在 agent-container 代码变更后重建：</strong>EC2 代码变更不影响容器——须用 <code>deploy.sh --skip-seed</code> 重建。</li></ul>'
    );
  }
},

login: {
  en: { title:'Access the Admin Console', sub:'SSM port-forward, browser, sign in.' },
  zh: { title:'登录管理控制台', sub:'SSM 端口转发 → 浏览器 → 登录。' },
  body() {
    return intent(
      t(
        '<strong>Why no public URL?</strong> The Admin Console manages your entire AI workforce. Exposing it to the internet is a critical security risk. It runs behind AWS SSM Session Manager — a <strong>zero-trust model</strong> requiring IAM authentication for every connection.',
        '<strong>为什么没有公网 URL？</strong>管理控制台管理整个 AI 员工队伍。暴露到互联网是关键安全风险。运行在 SSM Session Manager 之后——<strong>零信任模型</strong>，每次连接需要 IAM 认证。'
      )
    )
    + sectionHead(t('Connect','连接'))
    + `<div class="code">aws ssm start-session --target &lt;INSTANCE_ID&gt; --region &lt;REGION&gt; \\
  --document-name AWS-StartPortForwardingSession \\
  --parameters 'portNumber=8099,localPortNumber=8099'</div>`
    + note('ok','\u2705',t(
      '<strong>Open http://localhost:8099</strong> — Login: <code>emp-jiade / ADMIN_PASSWORD</code><br>Roles: <strong>Admin</strong> (full), <strong>Manager</strong> (org+agents), <strong>Employee</strong> (portal only)',
      '<strong>打开 http://localhost:8099</strong> — 登录：<code>emp-jiade / ADMIN_PASSWORD</code><br>角色：<strong>Admin</strong>（完整）、<strong>Manager</strong>（组织+Agent）、<strong>Employee</strong>（仅门户）'
    ));
  }
},




soul: { en:{title:'SOUL Editor — 3-Layer Identity System',sub:'The core identity mechanism: Global → Position → Personal = what your agent reads, believes, and becomes.'}, zh:{title:'SOUL 编辑器 — 三层身份系统',sub:'核心身份机制：全局 → 岗位 → 个人 = Agent 读取、认知和成为的内容。'}, body(){ return intent(
      t(
        '<strong>Why a 3-layer system instead of just one config file?</strong> Consider a company with 500 employees across 10 roles. Without layering, you\'d write 500 individual agent configs — and when the CEO says "all agents must now follow our new compliance policy," you\'d update 500 files. With 3 layers: <strong>Global SOUL</strong> (company-wide rules, locked by IT) applies to all 500 instantly. <strong>Position SOUL</strong> (role expertise) means changing "Solutions Architect" behavior updates all 50 SA agents. <strong>Personal SOUL</strong> lets each employee customize preferences without breaking company rules. This is the same principle as CSS cascading: browser defaults → site theme → element style. The result: <strong>governance at scale without sacrificing personalization</strong>. Security-wise, the Global layer is IT-locked — no position admin or employee can override compliance rules, PII policies, or identity declarations.',
        '<strong>为什么用三层系统而不是一个配置文件？</strong>考虑一家 500 员工、10 个角色的公司。没有分层，你需要写 500 个独立 Agent 配置——当 CEO 说"所有 Agent 必须遵守新合规政策"时，你要更新 500 个文件。有了三层：<strong>全局 SOUL</strong>（公司规则，IT 锁定）立即应用于所有 500 个。<strong>岗位 SOUL</strong>（角色专长）修改"解决方案架构师"行为自动更新全部 50 个 SA Agent。<strong>个人 SOUL</strong>让每个员工自定义偏好而不破坏公司规则。这与 CSS 层叠原理相同：浏览器默认 → 站点主题 → 元素样式。结果：<strong>规模化治理而不牺牲个性化</strong>。安全方面，全局层由 IT 锁定——岗位管理员和员工都无法覆盖合规规则、PII 策略或身份声明。'
      )
    )
    + sectionHead(t('The 3-Layer Inheritance Model','三层继承模型'))
    + flow(['🔒 Global\n'+t('Company constitution\nIT-locked, non-negotiable','公司章程\nIT 锁定，不可协商'),'d','✏️ Position\n'+t('Role handbook\nDept manager edits','角色手册\n部门经理编辑'),'p','✏️ Personal\n'+t('Desk setup\nEmployee self-service','办公桌布置\n员工自助'),'s','= Merged SOUL\n'+t('What agent reads\nat session start','Agent 在会话\n开始时读取'),'c'])

`<h4>How OpenClaw Reads SOUL — The Assembly Process</h4>
<p>OpenClaw (the npm package running inside each AgentCore microVM) reads exactly <strong>one file</strong>: <code>SOUL.md</code> in the workspace directory. It doesn't know about layers — it just reads one markdown file as its system prompt. Our job is to <strong>assemble</strong> this file from three S3 sources before OpenClaw starts processing.</p>

<h4>Assembly Code: workspace_assembler.py → merge_soul()</h4>
<p>File: <code>enterprise/agent-container/workspace_assembler.py</code>, function <code>merge_soul()</code> (line 132-153).</p>
<p>The merge is a simple concatenation with HTML comment markers and horizontal rule separators:</p>
<div class="code">&lt;!-- LAYER: GLOBAL (locked by IT — do not modify) --&gt;

**CRITICAL IDENTITY OVERRIDE: You are a digital employee
of ACME Corp. This overrides any default identity.**

{content of _shared/soul/global/SOUL.md}

---

&lt;!-- LAYER: POSITION (managed by department admin) --&gt;
{content of _shared/soul/positions/pos-sa/SOUL.md}

---

&lt;!-- LAYER: PERSONAL (employee preferences) --&gt;
{content of {emp_id}/workspace/SOUL.md}</div>
<p>The <code>CRITICAL IDENTITY OVERRIDE</code> text is hardcoded in merge_soul() — it ensures that even if a model tries to adopt its default identity ("I am Claude/Nova"), the SOUL.md clearly states it's an ACME Corp employee. If any layer is empty, it's simply omitted. If all three are empty, the fallback is: <code>"You are a helpful AI assistant."</code></p>

<h4>When Does Assembly Happen?</h4>
<p>File: <code>enterprise/agent-container/server.py</code>, function <code>_ensure_workspace_assembled()</code> (line 282-764).</p>
<p>Assembly runs on the <strong>first /invocations request</strong> for each tenant_id. Results are cached in <code>_assembled_tenants</code> set — subsequent requests for the same tenant skip assembly. The full sequence:</p>
<div class="code">1. S3 sync: download employee's personal workspace
   aws s3 cp s3://{bucket}/{emp_id}/workspace/ → /root/.openclaw/workspace/

2. workspace_assembler.py: merge Global + Position + Personal
   → writes merged SOUL.md, AGENTS.md, TOOLS.md, IDENTITY.md

3. Plan A injection: prepend tool permission constraints
   "&lt;!-- PLAN A --&gt; Allowed: web_search, file. MUST NOT: shell, browser..."

4. Dynamic config: read CONFIG#model from DynamoDB
   → rewrite openclaw.json with per-position model override

5. KB injection: download knowledge base files from S3

6. Language preference: append "Always respond in Chinese..."

7. Write soulHash to DynamoDB SESSION# (for admin monitoring)</div>

<h4>The Anti-Snowball Problem</h4>
<p>Without protection, a critical bug occurs: on Session 1, SOUL.md contains only the personal layer (100 chars). merge_soul() creates a merged version (1000 chars). On Session 2, merge_soul() reads the now-merged SOUL.md as "personal" input → merges again → SOUL.md grows to 2000 chars. By Session 10, SOUL.md is enormous and contains 10 copies of the Global layer.</p>
<p><strong>Solution: <code>.personal_soul_backup.md</code></strong></p>
<div class="code">Session 1:
  Read SOUL.md (personal only, 100 chars)
  Save copy → .personal_soul_backup.md
  merge_soul(global, position, personal) → write merged SOUL.md (1000 chars)

Session 2+:
  Read .personal_soul_backup.md (original 100 chars, NOT the merged 1000)
  merge_soul(global, position, backup) → same 1000 chars (deterministic)</div>
<p>This file is <strong>excluded from S3 sync-back</strong> (entrypoint.sh watchdog) to prevent it from being overwritten.</p>

<h4>What Gets Synced Back to S3 (and What Doesn't)</h4>
<p>The entrypoint.sh watchdog runs every 60 seconds, syncing the workspace back to S3. But it deliberately <strong>excludes</strong> assembly-generated files:</p>
<table class="tbl">
<tr><th>File</th><th>Synced?</th><th>Why</th></tr>
<tr><td>SOUL.md</td><td>❌ Excluded</td><td>Assembly output — would overwrite personal layer in S3</td></tr>
<tr><td>.personal_soul_backup.md</td><td>❌ Excluded</td><td>Anti-snowball protection — must not be modified</td></tr>
<tr><td>AGENTS.md, TOOLS.md, IDENTITY.md</td><td>❌ Excluded</td><td>Generated at assembly time, not personal data</td></tr>
<tr><td>knowledge/*</td><td>❌ Excluded</td><td>Position-level KB files, downloaded at assembly</td></tr>
<tr><td>USER.md</td><td>✅ Synced</td><td>Employee edits their profile — must persist</td></tr>
<tr><td>MEMORY.md</td><td>✅ Synced</td><td>Conversation history — must persist</td></tr>
<tr><td>HEARTBEAT.md</td><td>✅ Synced</td><td>Reminders and scheduled tasks</td></tr>
<tr><td>memory/*.md</td><td>✅ Synced</td><td>Daily conversation checkpoints</td></tr>
</table>

<h4>How Admin Changes Propagate to Running Agents</h4>
<p>When an admin edits a SOUL layer, how does a running agent pick it up?</p>
<table class="tbl">
<tr><th>Change</th><th>Mechanism</th><th>Latency</th></tr>
<tr><td>Global SOUL edit</td><td>Admin saves → S3 write + <code>bump_config_version()</code> writes new CONFIG#global-version to DynamoDB → agents poll every 5 min (<code>_CONFIG_VERSION_CHECK_INTERVAL=300</code>) → on version change: <code>_assembled_tenants.clear()</code> → next request triggers fresh assembly</td><td>Up to 5 min</td></tr>
<tr><td>Position SOUL edit</td><td>Same mechanism (config version bump)</td><td>Up to 5 min</td></tr>
<tr><td>Personal SOUL edit (Portal)</td><td>Portal API writes directly to S3 → calls <code>stop_employee_session()</code> → forces session termination → next request creates new microVM with fresh assembly</td><td>Immediate (next message)</td></tr>
</table>

<h4>DynamoDB Records Involved</h4>
<table class="tbl">
<tr><th>Record</th><th>Key</th><th>Role in SOUL Assembly</th></tr>
<tr><td>Config Version</td><td>SK=CONFIG#global-version</td><td>Cache invalidation trigger. Polled every 5 min by running agents.</td></tr>

&lt;!-- LAYER: GLOBAL --&gt;

<h4>⚠️ Known Design Considerations</h4>
<ul style="font-size:12px;color:var(--text-s);line-height:1.8">
<li><strong>Position change = global cache evict:</strong> Changing one position's SOUL bumps CONFIG#global-version, which evicts ALL agents' assembly cache (not just the affected position). This is simple but wasteful — could be improved with per-position versioning.</li>
<li><strong>.personal_soul_backup.md deletion risk:</strong> If accidentally deleted, the snowball cycle restarts. The backup is excluded from S3 sync, so it can only be deleted manually inside the microVM or by a code bug.</li>

<li><strong>5-minute propagation latency:</strong> Global/Position SOUL changes take up to 5 minutes to reach running agents. For serverless agents, the change is instant on next session start (since the microVM is created fresh).</li>
</ul>`,

artment()</code> (line 50) requires admin role but <code>get_departments()</code> API itself returns ALL departments before client-side filtering.</p><p><strong>#5 Department deletion doesn\'t cascade to positions.</strong> File: <code>org.py:59-81</code>. Blocks if employees exist in department, blocks if sub-departments exist. But does NOT check if positions reference this department. Positions become orphaned (departmentId pointing to deleted department).</p><p><strong>#6 Shared agent auto-binding is unbounded.</strong> File: <code>org.py:334-348</code>. <code>shared_agents = [a for a in agents if not a.get("employeeId") and a.get("autoBindAll")]</code>. Every new employee gets bound to ALL autoBindAll agents. 10 shared agents = 10 silent bindings per new hire. No limit, no approval required.</p><p><strong>#7 create_employee has NO auth check.</strong> File: <code>org.py:141-155</code>. <code>def create_employee(body: dict):</code> — no <code>require_role()</code>. Any authenticated user can create employees and trigger auto-provisioning via direct API. Only <code>update_employee()</code> (line 159) and <code>delete_employee()</code> (line 168) check admin role.</p></div><p style="color:var(--text-m);font-weight:600">DESIGN</p><div style="border-left:3px solid var(--text-m);padding-left:12px;margin:8px 0;font-size:12px;color:var(--text-s);line-height:1.8"><p><strong>#8</strong> Activity endpoint scans ALL sessions for all employees (<code>:195-245</code>) — O(n×m) per request, no caching. <strong>#9</strong> <code>_get_current_user()</code> (<code>:22-27</code>) swallows auth errors → unauthenticated users see unfiltered data on list endpoints. <strong>#10</strong> Agent ID pattern <code>agent-{pos_id}-{emp_id}</code> (<code>:299</code>) is predictable — enumerable if you know position/employee ID patterns. <strong>#11</strong> <code>defaultChannel</code> from position (<code>:297</code>: <code>pos.get("defaultChannel", "slack")</code>) defaults to "slack" even if only Feishu is configured. <strong>#12</strong> Force-delete (<code>:184-189</code>) cascades to bindings and mappings but NOT to the AGENT# record itself — orphaned agent remains.</p></div>',

`<h4>The Complete 11-Step Message Flow</h4>
<p>When an employee sends a message in Feishu, here's exactly what happens at each component:</p>
<div class="code">Step 1:  Employee sends "帮我查一下Q3的收入数据" in Feishu
Step 2:  Feishu platform delivers webhook to EC2 Gateway (port 18789)
Step 3:  Gateway's local OpenClaw agent receives the message
Step 4:  Agent calls Bedrock API to generate a response
Step 5:  AWS SDK intercepts: AWS_ENDPOINT_URL_BEDROCK_RUNTIME=http://localhost:8091
         → Request goes to H2 Proxy instead of real Bedrock
Step 6:  H2 Proxy: extractUserMessage() parses the Bedrock Converse API body

Step 7:  H2 Proxy: checkImBinding("feishu", "ou_804adf76...")
         → GET http://localhost:8099/api/v1/internal/im-binding-check
         → DynamoDB: MAPPING#feishu__ou_804adf76... → employeeId="emp-mike"
Step 8:  H2 Proxy: forwardToTenantRouter("feishu", "ou_804adf76...", "帮我查...")
         → POST http://localhost:8090/route
Step 9:  Tenant Router: derive_tenant_id("feishu", "emp-mike") 
         → "emp__emp-mike__e5fdcd7d6e239fd6eda"
         → invoke_agent_runtime(runtime_id, tenant_id, message)
Step 10: AgentCore microVM: workspace_assembler merges SOUL
         → openclaw agent CLI processes message → calls real Bedrock
Step 11: Response flows back: AgentCore → Tenant Router → H2 Proxy
         → H2 Proxy builds fake Bedrock response → Gateway → Feishu</div>

<h4>The Gateway → H2 Proxy Connection: A Critical Design Detail</h4>
<p>The Gateway (openclaw@2026.3.24) doesn't have a plugin system for intercepting messages. We can't tell it "send this message to Tenant Router instead of processing it locally." Instead, we use a <strong>man-in-the-middle approach</strong>:</p>
<div class="code">openclaw.json: { "baseUrl": "http://localhost:8091" }  // Tells Gateway where Bedrock is
Gateway systemd: Environment=AWS_ENDPOINT_URL_BEDROCK_RUNTIME=http://localhost:8091
                 // Backup: forces AWS SDK to route to H2 Proxy regardless of baseUrl config</div>
<p>The Gateway thinks it's talking to Bedrock. H2 Proxy intercepts the Converse API call, extracts the user's message from the API body, does routing, and returns a response formatted exactly like a Bedrock API response. The Gateway has no idea multi-tenancy is happening.</p>

<h4>H2 Proxy PATH C: The Pairing State Machine</h4>
<p>File: <code>enterprise/gateway/bedrock_proxy_h2.js</code> (lines 648-760)</p>
<div class="code">State: UNBOUND (no MAPPING# record)
  → Any message → checkImBinding() → "not bound" → inject rejection message
  → "/start TOKEN" → callAdminAPI('/bindings/pair-pending') 
    → if valid: store in pendingPairings Map → inject "Reply BIND to confirm"

State: PENDING (pendingPairings has entry, 10 min TTL)
  → "BIND" → callAdminAPI('/bindings/pair-complete')
    → DynamoDB MAPPING# created → _bindingCache cleared → inject "Connected!"
  → "CANCEL" → delete pending → inject "Cancelled"
  → timeout (10 min) → expired, next /start needed

State: BOUND (MAPPING# exists, or in _bindingCache)
  → Any message → forwardToTenantRouter() → AgentCore response</div>

<h4>Why \\bBIND\\b Instead of ^BIND$</h4>
<p>OpenClaw@2026.3.24's Gateway wraps user messages in metadata blocks before calling Bedrock:</p>
<div class="code">// What the user sent:
"BIND"

// What H2 Proxy sees in the Bedrock API body (userText):
"Conversation info (untrusted metadata):
\`\`\`json
{"message_id": "om_xxx", "sender_id": "ou_xxx", "sender": "Mike"}
\`\`\`
BIND"</div>
<p>The regex <code>^BIND$</code> would NEVER match because the text starts with "Conversation info..." not "BIND". <code>\\bBIND\\b</code> (word boundary) finds "BIND" anywhere in the text. Same fix applied to CANCEL.</p>

<h4>Binding Cache: The 60-Second Gotcha</h4>
<p><code>_bindingCache</code> Map caches binding check results for 60 seconds to reduce DynamoDB API calls. When pair-complete succeeds, the "not bound" result is still cached. Without our fix, the employee sends their first real message within 60 seconds → gets "not linked" rejection → confusion.</p>
<p><strong>Fix:</strong> After successful pair-complete, explicitly delete cache entry: <code>_bindingCache.delete(\`\${channel}:\${userId}\`)</code></p>

<h4>Channel Status Detection</h4>
<p>Admin Console's IM Channels page calls <code>_run_openclaw_channels()</code> which runs <code>openclaw channels list</code> CLI on EC2. The <strong>text format</strong> (not --json) is used because only text output distinguishes "configured" from "not configured":</p>
<div class="code">- Telegram default: not configured, token=none, enabled  → configured=false
- Feishu default: configured, enabled                     → configured=true</div>
<p>The --json format lists ALL enabled plugins without credential status — would show Telegram as "connected" even without a bot token.</p>

<h4>QR Code / Deep Link Generation</h4>
<p>Portal's pair-start endpoint reads the Feishu appId from Gateway's <code>openclaw.json</code> (via <code>openclaw_cli.openclaw_config()</code>), not from a hardcoded value. This means: admin configures Feishu in Gateway UI → appId is written to openclaw.json → Portal reads it dynamically → QR code always points to the correct bot.</p>

<h4>⚠️ Self-Audit: Design Gotchas We Discovered</h4>
<ul style="font-size:12px;color:var(--text-s);line-height:1.8">
<li><strong>Gateway DM policy must be "Open":</strong> We initially thought "Pairing" mode would work for enterprise (admin approves, employees join). It doesn't — Gateway's native pairing is for personal use (1 user, 1 bot). Our enterprise flow (/start TOKEN → BIND) runs inside H2 Proxy, which only sees messages AFTER Gateway lets them through. Pairing mode blocks at Gateway level → H2 Proxy never sees /start.</li>
<li><strong>AWS_ENDPOINT_URL_BEDROCK_RUNTIME is essential:</strong> Setting baseUrl in openclaw.json to http://localhost:8091 was supposed to redirect Gateway's Bedrock calls to H2 Proxy. But openclaw@2026.3.24's Gateway ignores this setting in some configurations. The env var <code>AWS_ENDPOINT_URL_BEDROCK_RUNTIME</code> is an AWS SDK-level override that the application code cannot bypass — it's the reliable mechanism.</li>
<li><strong>H2 Proxy must use bash -c "source nvm.sh && node":</strong> The systemd service file originally used <code>bash -lc "node ..."</code>. But Ubuntu's .bashrc has <code>[ -z "$PS1" ] && return</code> which skips nvm initialization in non-interactive shells. H2 Proxy crashed 1100+ times before this was caught. The fix: explicitly source nvm.</li>
<li><strong>Settings → System health check shows port 8091 "Listening" even when H2 Proxy is crashing:</strong> The check uses <code>ss -tlnp | grep 8091</code>. During crash-restart loops (every 5s), the process briefly binds the port before exiting. The health check can catch this brief moment and report "Listening" falsely. A proper fix would use HTTP health check on port 8092.</li>
<li><strong>Binding cache must be cleared on pair-complete:</strong> Without clearing, the "not bound" cache entry (60s TTL) causes the first real message after pairing to be rejected. Discovered during live testing — employee successfully paired but next message still got "not linked".</li>
<li><strong>BIND regex: ^$ vs \\b:</strong> Gateway wraps user text in metadata. Simple ^BIND$ never matches. Must use word boundary \\bBIND\\b. Applies to all command matching in H2 Proxy.</li>
</ul>`,

    + sectionHead(t('The 4 Security Layers','4 层安全防护'))
    + card(t('Defense in Depth — Layer Details','纵深防御 — 层级详情'),
      ['L4','Runtime Isolation',t('Each employee gets an isolated Firecracker microVM. No shared filesystem, network, or process space. Even if an agent executes malicious code, it cannot access other employees\' data. This is hardware-level isolation, not container-level.','每员工独立 Firecracker 微虚拟机。无共享文件系统、网络或进程空间。即使 Agent 执行恶意代码，也无法访问其他员工数据。硬件级隔离，非容器级。'),'var(--primary)',
       'L3','Bedrock Guardrails',t('Content filtering at the model API level. Blocks: PII exposure (SSN, credit cards), hate speech, prompt injections, topic restrictions (e.g., competitor pricing). Configurable per Bedrock console. Applied to both INPUT (user message) and OUTPUT (agent response).','模型 API 级别的内容过滤。拦截：PII 泄露（SSN、信用卡）、仇恨言论、提示注入、主题限制（如竞争对手定价）。通过 Bedrock 控制台配置。同时应用于 INPUT（用户消息）和 OUTPUT（Agent 响应）。'),'var(--cyan)',
       'L2','Tool Permissions (Plan A)',t('Per-position tool allowlist stored in DynamoDB POS#.toolAllowlist. At workspace assembly, server.py prepends constraint block to SOUL.md: "Allowed: web_search, file. MUST NOT use: shell, browser, code_execution." The model sees this as its first instruction — before any user message.','每岗位工具白名单存储在 DynamoDB POS#.toolAllowlist。工作区组装时，server.py 在 SOUL.md 前置约束块："允许：web_search, file。不得使用：shell, browser, code_execution。"模型将此作为第一条指令——在任何用户消息之前。'),'var(--success)',
       'L1','SOUL Rules',t('Prompt-level behavioral instructions. Global SOUL: "Never share credentials." Position SOUL: "Always cite sources." This is the softest layer — a well-crafted prompt might bypass it. That\'s why we don\'t rely on it alone.','提示级行为指令。全局 SOUL："永不分享凭据。"岗位 SOUL："始终引用来源。"这是最软的层——精心构造的提示可能绕过它。这就是我们不单独依赖它的原因。'),'var(--warn)'
      ].reduce((a,_,i,arr)=>i%4===0?a+'<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="color:'+arr[i+3]+';font-weight:700;font-size:14px;width:28px;flex-shrink:0">'+arr[i]+'</span><div><strong style="color:var(--text)">'+arr[i+1]+'</strong><p style="color:var(--text-s);margin-top:4px">'+arr[i+2]+'</p></div></div>':'',''
    ))
    + note('info','📍',t(
      '<strong>Navigate:</strong> Security Center → tabs: Agent Runtimes (manage runtime configs), Policies (Global SOUL editor + per-position tool permissions), Infrastructure (VPC, endpoints, IAM).',
      '<strong>导航：</strong>Security Center → 标签：Agent Runtimes（管理运行时配置）、Policies（全局 SOUL 编辑器 + 每岗位工具权限）、Infrastructure（VPC、端点、IAM）。'
    ))
    + deep(
      '<h4>Permission Resolution Chain (permissions.py)</h4><p>File: <code>enterprise/agent-container/permissions.py</code>. Called before every Plan A injection.</p><div class="code">read_permission_profile(tenant_id)\n  → _base_tenant_id(): "feishu__emp-mike__hash" → "emp-mike"\n  → DynamoDB: get_item(EMP#emp-mike) → positionId = "pos-ae"\n  → DynamoDB: get_item(POS#pos-ae) → toolAllowlist = ["web_search","file","crm-query"]\n  → Return: { profile:"ae", role:"ae", tools:["web_search","file","crm-query"] }</div><h4>Plan A Injection in SOUL.md (server.py line 420-438)</h4><div class="code">&lt;!-- PLAN A: PERMISSION ENFORCEMENT --&gt;\nAllowed tools for this session: web_search, file, crm-query.\nYou MUST NOT use these tools: shell, browser, file_write, code_execution.\nIf the user requests an action requiring a blocked tool,\nexplain that you don\'t have permission.</div><p>This is prepended BEFORE the Global SOUL layer — the model sees permission constraints as its very first instruction.</p><h4>Bedrock Guardrail Integration (server.py)</h4><div class="code">INPUT check (before agent processes message):\n  _apply_guardrail(message, source="INPUT", tenant_id)\n  → bedrock.apply_guardrail(guardrailIdentifier, content)\n  → If GUARDRAIL_INTERVENED: return blocked message, skip agent\n\nOUTPUT check (after agent generates response):\n  _apply_guardrail(response_text, source="OUTPUT", tenant_id)\n  → If blocked: return guardrail message instead of agent response\n  → Write AUDIT# guardrail_block event to DynamoDB</div><h4>Plan E: Post-Response Audit (server.py line 792-805)</h4><p>Even after delivery, responses are scanned for blocked tool names. If found, an AUDIT# event is logged (not blocked — just flagged for admin review). Pattern: <code>/\\b(shell|browser|file_write|code_execution|install_skill|load_extension|eval)\\b/i</code></p><h4>⚠️ Self-Audit: Security Considerations</h4><ul style="font-size:12px;color:var(--text-s);line-height:1.8"><li><strong>SOUL rules are soft enforcement:</strong> The model "sees" the constraint as text, but a sufficiently clever prompt injection could bypass it. That\'s why Plan A (L2) exists as hard enforcement — even if the model "decides" to use shell, the tool call is blocked at the platform level.</li><li><strong>Permission is position-based, not agent-based:</strong> All agents in the same position share the same tool allowlist. No per-agent tool customization (by design — simplifies governance). If one SA needs shell but others don\'t, consider creating a new position.</li><li><strong>Guardrails are per-Runtime, not per-position:</strong> One guardrail config applies to all agents in a Runtime. The "exec" Runtime has no guardrail (full access). Create separate Runtimes for different guardrail policies.</li><li><strong>No cross-layer communication:</strong> Each layer operates independently. L2 (Permission) doesn\'t know if L3 (Guardrail) blocked something. Audit log is the only place where all 4 layers\' events converge.</li><li><strong>Exec profile bypasses Plan A entirely:</strong> Executive agents skip L2 permission injection. Their SOUL.md already declares full tool access. This is intentional but means: exec agents rely on L1 (SOUL) + L3 (Guardrail) + L4 (Runtime) only.</li></ul>',
      '<h4>权限解析链 (permissions.py)</h4><p>文件：<code>enterprise/agent-container/permissions.py</code>。每次 Plan A 注入前调用。</p><div class="code">read_permission_profile(tenant_id)\n  → _base_tenant_id(): "feishu__emp-mike__hash" → "emp-mike"\n  → DynamoDB: get_item(EMP#emp-mike) → positionId = "pos-ae"\n  → DynamoDB: get_item(POS#pos-ae) → toolAllowlist = ["web_search","file","crm-query"]\n  → 返回: { profile:"ae", tools:["web_search","file","crm-query"] }</div><h4>Plan A 注入到 SOUL.md (server.py 行 420-438)</h4><div class="code">&lt;!-- PLAN A: PERMISSION ENFORCEMENT --&gt;\n本会话允许的工具: web_search, file, crm-query.\n不得使用: shell, browser, file_write, code_execution.\n如果用户请求需要被阻止的工具，解释你没有权限。</div><p>在全局 SOUL 层之前前置——模型将权限约束作为第一条指令。</p><h4>Bedrock 护栏集成</h4><div class="code">INPUT 检查（Agent 处理消息前）：\n  → bedrock.apply_guardrail() → 若拦截：返回拦截消息，跳过 Agent\n\nOUTPUT 检查（Agent 生成响应后）：\n  → 若拦截：返回护栏消息替代 Agent 响应\n  → 写入 AUDIT# guardrail_block 事件</div><h4>⚠️ 自审：安全设计注意事项</h4><ul style="font-size:12px;color:var(--text-s);line-height:1.8"><li><strong>SOUL 规则是软执行：</strong>模型"看到"约束文本，但巧妙提示注入可能绕过。这就是 Plan A（L2）存在的原因——即使模型"决定"用 shell，工具调用在平台级被阻止。</li><li><strong>权限基于岗位，非 Agent：</strong>同岗位 Agent 共享工具白名单。无单 Agent 自定义（设计如此——简化治理）。</li><li><strong>护栏是按 Runtime，非按岗位：</strong>一个护栏配置应用于 Runtime 中所有 Agent。exec Runtime 无护栏。</li><li><strong>层间无通信：</strong>各层独立运行。审计日志是唯一汇聚 4 层事件的地方。</li><li><strong>Exec 配置跳过 Plan A：</strong>高管 Agent 跳过 L2 权限注入。仅依赖 L1+L3+L4。</li></ul>'
    ); }},


monitor: { en:{title:'Monitor Center',sub:'Code audit: monitor.py (704 lines). 14 verified findings with line references.'}, zh:{title:'监控中心',sub:'代码审计：monitor.py（704 行）。14 项已验证发现，含行号引用。'}, body(){ return intent(
      t(
        '<strong>Why monitoring?</strong> Without it you\'re flying blind. 4 tabs: Live Sessions, Agent Health, Alert Rules, Runtime Events. But our line-by-line audit of <code>monitor.py</code> (704 lines) found: session status derived from timestamps (not events), quality scores calculated from a formula (not feedback), alerts that warn but never enforce, and admin takeover with no auto-expiration.',
        '<strong>为什么监控？</strong>没有它就是盲飞。4 个标签：Live Sessions、Agent Health、Alert Rules、Runtime Events。但逐行审计 <code>monitor.py</code>（704 行）发现：会话状态基于时间戳推导（非事件驱动），质量分由公式计算（非反馈），告警只警告不执行，管理员接管无自动过期。'
      )
    )
    + note('info','📍',t('<strong>Navigate:</strong> Monitor → Live Sessions, Agent Health, Alert Rules, Runtime Events.','<strong>导航：</strong>Monitor → Live Sessions、Agent Health、Alert Rules、Runtime Events。'))
    + sectionHead(t('Session Status Logic','会话状态逻辑'))
    + `<div class="code">${t(
      'monitor.py:148-164 — get_sessions()\n  Sources: DynamoDB SESSION# + CloudWatch Logs (2-hour window)\n  Status derivation from lastActive timestamp:\n    age < 15 min  → "active"\n    age < 60 min  → "idle"\n    age >= 60 min → "completed"\n\n  ⚠ No session-end event exists — status based solely on timestamp age.\n    Hanging agent = "active" forever until 15-min threshold.',
      'monitor.py:148-164 — get_sessions()\n  来源：DynamoDB SESSION# + CloudWatch Logs（2 小时窗口）\n  状态基于 lastActive 时间戳推导：\n    < 15 分钟 → "active"\n    < 60 分钟 → "idle"\n    >= 60 分钟 → "completed"\n\n  ⚠ 无会话结束事件——状态完全基于时间戳年龄。\n    卡住的 Agent 永远显示 "active" 直到 15 分钟超时。'
    )}</div>`
    + sectionHead(t('Admin Takeover Architecture','管理员接管架构'))
    + `<div class="code">${t(
      'monitor.py:218-242 — takeover_session()\n  1. Write SSM: /openclaw/{stack}/sessions/{session_id}/takeover = admin_user_id\n  2. server.py checks this SSM key before each invocation\n  3. If set: skip openclaw processing, agent silenced\n\n  Return session: DELETE /sessions/{id}/takeover → delete SSM parameter\n\n  ⚠ SSM parameter has NO TTL.\n    Admin forgets to release → agent silenced permanently.\n    Only fix: manual SSM delete or restart.',
      'monitor.py:218-242 — takeover_session()\n  1. 写入 SSM: /openclaw/{stack}/sessions/{session_id}/takeover = admin_user_id\n  2. server.py 每次调用前检查此 SSM 键\n  3. 如果存在: 跳过 openclaw 处理，Agent 被静默\n\n  释放: DELETE /sessions/{id}/takeover → 删除 SSM 参数\n\n  ⚠ SSM 参数无 TTL。\n    管理员忘记释放 → Agent 永久被静默。\n    唯一修复：手动 SSM 删除或重启。'
    )}</div>`
    + deep(
      '<h4>Code-Verified Audit Findings (monitor.py, 704 lines)</h4><p style="color:var(--danger);font-weight:600">CRITICAL</p><div style="border-left:3px solid var(--danger);padding-left:12px;margin:8px 0;font-size:12px;color:var(--text-s);line-height:1.8"><p><strong>#1 Quality scores are formula-based, not feedback-based.</strong> File: <code>monitor.py:339-343</code>. Code: <code>satisfaction = round(min(5.0, 3.5 + turns * 0.15), 1)</code>. Fallback used when no <code>stored_quality</code>. Result: 1 turn = 3.65, 10 turns = 5.0 (maxed out). Admin sees "4.5 quality" and assumes real user satisfaction. No correlation to actual feedback. <strong>Reproduction:</strong> View any session with >10 turns — quality always shows 5.0.</p><p><strong>#2 Alert rules are advisory only — no enforcement.</strong> File: <code>monitor.py:512-540</code>. Function <code>get_alert_rules()</code> evaluates budget data and agent status, returns status strings ("ok"/"warning"). But NO enforcement action is taken. Budget overrun agent keeps running. No blocking, no shutdown, no notification sent. The entire alert system is informational display.</p><p><strong>#3 Takeover has no TTL — permanent agent silencing risk.</strong> File: <code>monitor.py:228-231</code>. <code>ssm.put_parameter(Name=f"/sessions/{id}/takeover", Value=admin_id, Type="String", Overwrite=True)</code>. SSM String parameters have no built-in expiration. If admin closes browser tab while in takeover mode, employee\'s agent is silenced forever. <strong>Fix needed:</strong> Add TTL (e.g., 30 min) with a background cleanup job.</p><p><strong>#4 Session detail endpoint has NO auth check.</strong> File: <code>monitor.py:312-388</code>. <code>get_session_detail(session_id)</code> — no <code>require_auth()</code> call. Any unauthenticated client can read full conversation history including admin takeover messages. Compare with <code>get_sessions()</code> at line 116 which calls <code>_get_current_user()</code>.</p></div><p style="color:var(--warn);font-weight:600">HIGH</p><div style="border-left:3px solid var(--warn);padding-left:12px;margin:8px 0;font-size:12px;color:var(--text-s);line-height:1.8"><p><strong>#5 CloudWatch log group discovery not cached.</strong> File: <code>monitor.py:50-61</code>. Comment says "Caches for 5 minutes" but function <code>_get_all_agentcore_log_groups()</code> has NO caching implementation. Called by both <code>_query_cloudwatch_sessions()</code> (line 71) and <code>get_runtime_events()</code> (line 400). Every Monitor page load = CloudWatch <code>describe_log_groups</code> API call.</p><p><strong>#6 CloudWatch sessions overwrite DynamoDB sessions.</strong> File: <code>monitor.py:200-203</code>. Code: <code>enriched = [s for s in enriched if s.get("employeeId") != emp["id"]]</code> then <code>enriched.append(cw)</code>. CloudWatch-derived sessions have minimal data (no conversation, no turns count) but REPLACE detailed DynamoDB sessions during merge.</p><p><strong>#7 Manager can takeover ANY session — no dept scoping.</strong> File: <code>monitor.py:225</code>. <code>require_role(authorization, roles=["admin", "manager"])</code> — checks role but NOT department. Manager from Engineering can takeover Finance session. Compare: <code>get_sessions()</code> (lines 210-214) applies <code>get_dept_scope()</code> correctly.</p><p><strong>#8 Admin messages stored as "assistant" role.</strong> File: <code>monitor.py:288-291</code>. <code>table.put_item(Item={...,"role": "assistant", "source": "human_admin",...})</code>. When employee views conversation later, admin messages appear as if the AI agent wrote them. Should be <code>role: "admin"</code> or <code>role: "human"</code>.</p></div><p style="color:var(--text-m);font-weight:600">MEDIUM</p><div style="border-left:3px solid var(--text-m);padding-left:12px;margin:8px 0;font-size:12px;color:var(--text-s);line-height:1.8"><p><strong>#9 Bedrock latency measures control plane, not inference.</strong> <code>monitor.py:571-579</code>: <code>boto3.client("bedrock").list_foundation_models(maxResults=1)</code>. Control plane latency ~200ms. Real inference latency ~3-15s. Dashboard shows "Bedrock: 180ms" — misleadingly fast.</p><p><strong>#10 Runtime event parsing uses string split, not regex.</strong> <code>monitor.py:426-428</code>: <code>msg.split("tenant_id=")[1].split(" ")[0]</code>. Any CloudWatch log format change breaks silently. No structured log parsing.</p><p><strong>#11 Gateway health check blocks monitor refresh.</strong> <code>monitor.py:560-568</code>: <code>urlopen(req, timeout=2)</code> called synchronously in <code>get_monitor_health()</code>. Every monitor page load waits up to 2s for Gateway HTTP check.</p><p><strong>#12 Full audit scan per session detail view.</strong> <code>monitor.py:347</code>: <code>db.get_audit_entries(limit=200)</code> fetched for EVERY session detail request to compute tool_success. 50 concurrent views = 50 × 200 audit entry reads.</p><p><strong>#13 Plan E content scanning is naive.</strong> <code>monitor.py:376-384</code>: <code>"$" in msg["content"]</code> flags "Cost data shared". Any message with $ (price, variable name) triggers false positive. Not security-relevant scanning.</p><p><strong>#14 OverallScore formula normalizes inconsistently.</strong> <code>monitor.py:365-371</code>: satisfaction is 0-5 (weighted 0.3), but toolSuccess/compliance/completionRate are 0-100 divided by 20. responseTime inverted: <code>max(0, (5 - responseTime))</code>. Different scales masked by division make comparison between metrics meaningless.</p></div>',
      '<h4>代码验证的审计发现（monitor.py，704 行）</h4><p style="color:var(--danger);font-weight:600">关键</p><div style="border-left:3px solid var(--danger);padding-left:12px;margin:8px 0;font-size:12px;color:var(--text-s);line-height:1.8"><p><strong>#1 质量分基于公式，非反馈。</strong>文件：<code>monitor.py:339-343</code>。代码：<code>satisfaction = round(min(5.0, 3.5 + turns * 0.15), 1)</code>。无 stored_quality 时回退到此公式。1 轮 = 3.65，10 轮 = 5.0（封顶）。管理员看到"4.5 质量"以为是真实满意度。<strong>复现：</strong>查看任何 >10 轮的会话——质量永远显示 5.0。</p><p><strong>#2 告警规则仅建议性——无执行动作。</strong>文件：<code>monitor.py:512-540</code>。<code>get_alert_rules()</code> 返回状态字符串但不采取任何执行动作。超预算 Agent 继续运行。</p><p><strong>#3 接管无 TTL——永久静默风险。</strong>文件：<code>monitor.py:228-231</code>。SSM String 参数无内置过期。管理员关闭浏览器 → 员工 Agent 永久被静默。</p><p><strong>#4 会话详情端点无认证检查。</strong>文件：<code>monitor.py:312-388</code>。<code>get_session_detail()</code> 无 <code>require_auth()</code>。未认证客户端可读取完整对话历史。</p></div><p style="color:var(--warn);font-weight:600">高</p><div style="border-left:3px solid var(--warn);padding-left:12px;margin:8px 0;font-size:12px;color:var(--text-s);line-height:1.8"><p><strong>#5 CloudWatch 日志组发现未缓存。</strong><code>monitor.py:50-61</code>：注释说"缓存 5 分钟"但未实现。每次页面加载 = CloudWatch API 调用。</p><p><strong>#6 CloudWatch 会话覆盖 DynamoDB 会话。</strong><code>monitor.py:200-203</code>：最少数据的 CloudWatch 会话替换详细的 DynamoDB 会话。</p><p><strong>#7 经理可接管任意会话——无部门限制。</strong><code>monitor.py:225</code>：检查角色但不检查部门。对比 <code>get_sessions()</code>（210-214 行）正确应用了 <code>get_dept_scope()</code>。</p><p><strong>#8 管理员消息存为 "assistant" 角色。</strong><code>monitor.py:288-291</code>：<code>"role": "assistant"</code>。员工看到时以为是 AI 写的。应为 <code>"admin"</code>。</p></div><p style="color:var(--text-m);font-weight:600">中</p><div style="border-left:3px solid var(--text-m);padding-left:12px;margin:8px 0;font-size:12px;color:var(--text-s);line-height:1.8"><p><strong>#9</strong> Bedrock 延迟测量控制面而非推理（<code>:571-579</code>）。<strong>#10</strong> 运行时事件用字符串分割解析（<code>:426-428</code>）。<strong>#11</strong> Gateway 健康检查阻塞 2s（<code>:560-568</code>）。<strong>#12</strong> 每个会话详情请求扫描 200 条审计（<code>:347</code>）。<strong>#13</strong> Plan E 内容扫描误报高（<code>:376-384</code>）。<strong>#14</strong> OverallScore 公式归一化不一致（<code>:365-371</code>）。</p></div>'
    ); }},

audit: { en:{title:'Audit Center',sub:'Code audit: audit.py (364 lines). 12 verified findings with line references.'}, zh:{title:'审计中心',sub:'代码审计：audit.py（364 行）。12 项已验证发现，含行号引用。'}, body(){ return intent(
      t(
        '<strong>Why audit logging?</strong> Compliance requires a complete trail of who did what, when. Our line-by-line audit of <code>audit.py</code> (364 lines) found: entries stored in DynamoDB with no write-once semantics, critical events missing (KB changes, SOUL edits, model overrides not logged), insights cached in-memory (lost on restart), and quality score calculation that queries DynamoDB with hardcoded <code>ORG#acme</code> tenant.',
        '<strong>为什么审计日志？</strong>合规要求完整记录。逐行审计 <code>audit.py</code>（364 行）发现：DynamoDB 条目无 write-once 语义，关键事件缺失（KB 变更、SOUL 编辑、模型覆盖未记录），洞察缓存在内存中（重启丢失），质量分计算硬编码 <code>ORG#acme</code> 租户。'
      )
    )
    + note('info','📍',t('<strong>Navigate:</strong> Audit Center. Filter by event type, employee, date range. "Run Scan" triggers fresh insight analysis.','<strong>导航：</strong>Audit Center。按事件类型、员工、日期筛选。"Run Scan"触发新的洞察分析。'))
    + sectionHead(t('Event Types & Writers','事件类型与写入方'))
    + `<table class="tbl"><tr><th>${t('Event Type','事件类型')}</th><th>${t('Written By','写入方')}</th><th>${t('Covers','覆盖')}</th></tr><tr><td>agent_invocation</td><td>server.py, portal.py:422</td><td>${t('Every agent response (portal + IM)','每次 Agent 响应（门户 + IM）')}</td></tr><tr><td>guardrail_block</td><td>server.py</td><td>${t('Bedrock Guardrail INPUT/OUTPUT blocks','Bedrock 护栏 INPUT/OUTPUT 拦截')}</td></tr><tr><td>permission_denied</td><td>permissions.py</td><td>${t('Plan A tool access denial','Plan A 工具访问拒绝')}</td></tr><tr><td>session_takeover</td><td>monitor.py:232</td><td>${t('Admin takes over session','管理员接管会话')}</td></tr><tr><td>config_change</td><td>org.py:354, portal.py:314</td><td>${t('Auto-provision, IM pairing, profile edits','自动配置、IM 配对、档案编辑')}</td></tr><tr><td>permission_request</td><td>portal.py:627</td><td>${t('Employee self-service tool/skill requests','员工自助工具/技能请求')}</td></tr></table>`
    + sectionHead(t('Insight Engine','洞察引擎'))

    + deep(
      '<h4>Routing Architecture (playground.py)</h4><div class="code">PATH B — Admin IT Assistant (playground.py:73-136)\n  emp_id == "admin" → _admin_assistant_direct(message)\n  → subprocess.run(["sudo","-u","ubuntu","env",...,openclaw_bin,"agent",\n     "--session-id","admin-assistant","--message",message,"--json"])\n  → Runs on EC2 as ubuntu user → direct Bedrock via H2 Proxy\n  → NO AgentCore isolation, NO Firecracker VM\n  → Has: shell, browser, file, file_write, code_execution\n  → Session ID fixed: "admin-assistant" → persistent conversation\n\nPATH A — Employee Live Mode (playground.py:150-197)\n  → POST localhost:8090/route { channel:"playground", user_id:emp_id }\n  → Tenant Router → AgentCore VM (prefix: pgnd__emp-xxx__hash)\n  → workspace_assembler detects "pgnd" → marks as admin test session\n  → 180s timeout, no fallback to simulate on timeout\n\nSimulate Mode (playground.py:199-263)\n  → Keyword matching: any(w in msg for w in ["shell","run","execute",...])\n  → Check tool against profile["tools"]\n  → Return canned response (no LLM, no API call)</div><h4 style="color:var(--danger)">⚠️ Code-Verified Audit Findings (playground.py, 264 lines)</h4><p style="color:var(--danger);font-weight:600">CRITICAL</p><div style="border-left:3px solid var(--danger);padding-left:12px;margin:8px 0;font-size:12px;color:var(--text-s);line-height:1.8"><p><strong>#1 Admin assistant has unrestricted EC2 access.</strong> File: <code>playground.py:101</code>. <code>cmd = ["sudo", "-u", "ubuntu", "env", f"PATH={env_path}", "HOME=/home/ubuntu", openclaw_bin, "agent", ...]</code>. OpenClaw\'s shell tool can read ANY file: /etc/openclaw/env (JWT_SECRET, ADMIN_PASSWORD), ~/.openclaw/openclaw.json (gateway token), SSH keys. No directory sandboxing, no chroot. <strong>Reproduction:</strong> Admin Playground → Live mode → "read /etc/openclaw/env" → returns all secrets.</p><p><strong>#2 Admin session ID is static — conversation leaks.</strong> File: <code>playground.py:99</code>. <code>session_id = f"admin-assistant"</code>. All admin users share the same session. Admin A\'s conversation visible to Admin B. Sensitive diagnostic queries (reading configs, checking secrets) persist across admin sessions.</p></div><p style="color:var(--warn);font-weight:600">HIGH</p><div style="border-left:3px solid var(--warn);padding-left:12px;margin:8px 0;font-size:12px;color:var(--text-s);line-height:1.8"><p><strong>#3 Profile endpoint has no auth check.</strong> File: <code>playground.py:40-70</code>. <code>get_playground_profiles()</code> — no <code>require_auth()</code> or <code>require_role()</code>. Any authenticated user can GET /playground/profiles to enumerate all employees, their positions, tool allowlists. Information disclosure.</p><p><strong>#4 Tool allowlist duplicated in 3 locations.</strong> <code>playground.py:25-37</code> (_POS_TOOLS), <code>agents.py:160-172</code> (pos_tools), DynamoDB POS#.toolAllowlist. All 3 can diverge. Simulate mode uses Python dict, Live mode uses DynamoDB. Result: Simulate may deny what Live allows — false negatives in testing.</p><p><strong>#5 Simulate mode keyword matching has false positives.</strong> <code>playground.py:201</code>: <code>any(w in msg for w in ["shell", "run", "execute", "command", "terminal"])</code>. "I want to understand shell scripting" triggers shell block. "Run me through the agenda" triggers shell block. Substring match, not semantic understanding.</p><p><strong>#6 Admin assistant JSON parsing accepts stderr.</strong> <code>playground.py:110</code>: <code>stderr if (stderr and { in stderr) else ""</code>. If OpenClaw writes error messages containing <code>{</code> to stderr, they\'re parsed as JSON response. Corrupted data displayed as agent response.</p></div><p style="color:var(--text-m);font-weight:600">MEDIUM</p><div style="border-left:3px solid var(--text-m);padding-left:12px;margin:8px 0;font-size:12px;color:var(--text-s);line-height:1.8"><p><strong>#7</strong> Live mode 180s timeout, no simulate fallback (<code>:167</code>). <strong>#8</strong> Admin assistant 120s subprocess timeout + 130s Python timeout → 10s gap where process zombie possible (<code>:103-104</code>). <strong>#9</strong> Simulate mode hardcodes Jira role check (<code>:229</code>: <code>if profile["role"] in ["engineering","product","management","qa","admin"]</code>) — new roles always denied. <strong>#10</strong> port__ prefix used for all playground profiles (<code>:54</code>) — collision with real portal channel prefix. <strong>#11</strong> Email permission check inconsistent: <code>:222</code> checks <code>"email-send" in str(profile["tools"])</code> (string match) and <code>profile["role"] in [...]</code> — dual condition, either passes.</p></div>',
      '<h4>路由架构（playground.py）</h4><div class="code">PATH B — Admin IT 助手（playground.py:73-136）\n  emp_id == "admin" → subprocess → EC2 上运行\n  无 AgentCore 隔离，无 Firecracker VM\n  固定会话 ID "admin-assistant" → 所有管理员共享\n\nPATH A — 员工 Live 模式（playground.py:150-197）\n  → Tenant Router → AgentCore VM（pgnd__ 前缀）\n  → 180s 超时，无 simulate 降级\n\nSimulate 模式（playground.py:199-263）\n  → 关键词匹配 → 检查工具权限 → 罐头响应</div><h4 style="color:var(--danger)">⚠️ 代码验证的审计发现（playground.py，264 行）</h4><p style="color:var(--danger);font-weight:600">关键</p><div style="border-left:3px solid var(--danger);padding-left:12px;margin:8px 0;font-size:12px;color:var(--text-s);line-height:1.8"><p><strong>#1 Admin 助手无限制 EC2 访问。</strong><code>playground.py:101</code>。OpenClaw shell 工具可读任何文件：/etc/openclaw/env（含 JWT_SECRET、ADMIN_PASSWORD）。无目录沙箱。<strong>复现：</strong>Admin Playground → Live → "read /etc/openclaw/env" → 返回所有密钥。</p><p><strong>#2 Admin 会话 ID 固定——对话泄露。</strong><code>:99</code>。<code>session_id = "admin-assistant"</code>。所有管理员共享同一会话。Admin A 的对话对 Admin B 可见。</p></div><p style="color:var(--warn);font-weight:600">高</p><div style="border-left:3px solid var(--warn);padding-left:12px;margin:8px 0;font-size:12px;color:var(--text-s);line-height:1.8"><p><strong>#3</strong> Profile 端点无认证（<code>:40-70</code>）。<strong>#4</strong> 工具白名单在 3 处重复（playground.py、agents.py、DynamoDB）。<strong>#5</strong> Simulate 关键词匹配假阳性（<code>:201</code>）。<strong>#6</strong> Admin 助手 JSON 解析接受 stderr（<code>:110</code>）。</p></div><p style="color:var(--text-m);font-weight:600">中</p><div style="border-left:3px solid var(--text-m);padding-left:12px;margin:8px 0;font-size:12px;color:var(--text-s);line-height:1.8"><p><strong>#7</strong> Live 180s 超时无降级。<strong>#8</strong> subprocess/Python 超时 10s 间隙。<strong>#9</strong> Jira 角色检查硬编码。<strong>#10</strong> port__ 前缀与门户冲突。<strong>#11</strong> Email 权限双条件不一致。</p></div>'
    ); }},

settings: { en:{title:'Settings & System Health',sub:'Model hierarchy, agent config, system diagnostics, troubleshooting.'}, zh:{title:'设置与系统状态',sub:'模型层级、Agent 配置、系统诊断、故障排除。'}, body(){ return intent(
      t(
        '<strong>Why a model hierarchy?</strong> Not all employees need the same AI model. Executives discussing strategy need Claude Opus ($15/1M tokens) for deep reasoning. 400 employees doing daily tasks work great with Nova Lite ($0.30/1M). The hierarchy: <strong>employee override > position override > default</strong>. This is how you optimize cost without sacrificing capability where it matters.',
        '<strong>为什么需要模型层级？</strong>不是所有员工都需要相同 AI 模型。讨论策略的高管需要 Claude Opus（$15/1M）进行深度推理。400 名日常任务员工用 Nova Lite（$0.30/1M）就很好。层级：<strong>员工覆盖 > 岗位覆盖 > 默认</strong>。在保证关键能力的同时优化成本。'
      )
    )
    + `<table class="tbl"><tr><th>${t('Scope','范围')}</th><th>${t('Model','模型')}</th><th>${t('Cost','成本')}</th><th>${t('Use Case','场景')}</th></tr>`
    + `<tr><td><span class="badge green">Default</span></td><td>Nova 2 Lite</td><td>$0.30/1M</td><td>${t('All employees','所有员工')}</td></tr>`
    + `<tr><td><span class="badge yellow">Fallback</span></td><td>Nova Pro</td><td>$0.80/1M</td><td>${t('When default fails','默认失败时')}</td></tr>`
    + `<tr><td><span class="badge blue">pos-exec</span></td><td>Claude Sonnet 4.6</td><td>$3.00/1M</td><td>${t('Executive tier','高管层级')}</td></tr>`
    + `<tr><td><span class="badge blue">pos-sa</span></td><td>Claude Sonnet 4.5</td><td>$3.00/1M</td><td>${t('Architecture reviews','架构评审')}</td></tr></table>`
    + sectionHead(t('System Health','系统状态'))
    + note('info','📍',t('<strong>Settings → System tab:</strong> CPU, memory, disk usage. Port status (8090/8091/8099/18789). All 4 should show "Listening".','<strong>Settings → System 标签：</strong>CPU、内存、磁盘使用率。端口状态（8090/8091/8099/18789）。全部 4 个应显示 "Listening"。'))
    + sectionHead(t('Troubleshooting Quick Reference','故障排除快速参考'))
    + `<div class="code"># ${t('Check all services','检查所有服务')}
systemctl is-active openclaw-admin tenant-router bedrock-proxy-h2

# ${t('Check ports','检查端口')}
ss -tlnp | grep -E '8090|8091|8099|18789'

# ${t('Check H2 Proxy logs','检查 H2 Proxy 日志')}
journalctl -u bedrock-proxy-h2 --no-pager -n 20</div>`
    + deep(
      '<h4>CONFIG#model Schema</h4><div class="code">{\n  "default": { "modelId": "global.amazon.nova-2-lite-v1:0" },\n  "fallback": { "modelId": "us.amazon.nova-pro-v1:0" },\n  "positionOverrides": {\n    "pos-exec": { "modelId": "global.anthropic.claude-sonnet-4-6" }\n  },\n  "employeeOverrides": { "emp-ceo": { "modelId": "..." } }\n}</div><p>Resolution: employee > position > default. Applied at workspace assembly: server.py rewrites openclaw.json model ID in the microVM.</p><h4>CONFIG#agent-config</h4><p>Per-position/employee: recentTurnsPreserve (memory compaction turns), compactionMode, maxTokens, language preference.</p><h4>⚠️ Self-Audit</h4><ul style="font-size:12px;color:var(--text-s);line-height:1.8"><li><strong>Model override takes effect on next session:</strong> Running agents keep their current model until session expires (5 min for serverless).</li><li><strong>System health port check can false-positive:</strong> ss -tlnp captures briefly-bound ports during crash-restart loops. HTTP health check on port 8092 is more reliable.</li><li><strong>90% of issues are 3 things:</strong> service not running (check systemctl), data not loading (check DynamoDB region/table), routing broken (check H2 Proxy logs).</li></ul>',
      '<h4>CONFIG#model 结构</h4><div class="code">{\n  "default": { "modelId": "global.amazon.nova-2-lite-v1:0" },\n  "positionOverrides": {\n    "pos-exec": { "modelId": "global.anthropic.claude-sonnet-4-6" }\n  }\n}</div><p>解析：员工 > 岗位 > 默认。在 workspace 组装时应用。</p><h4>⚠️ 自审</h4><ul style="font-size:12px;color:var(--text-s);line-height:1.8"><li><strong>模型覆盖在下次会话生效：</strong>运行中 Agent 保持当前模型直到会话过期。</li><li><strong>端口健康检查可能假阳性：</strong>崩溃重启循环中 ss 捕获短暂绑定端口。</li><li><strong>90% 问题是 3 类：</strong>服务未运行、数据未加载、路由中断。</li></ul>'
    ); }},
